            ["耐心倾听", "理性分析", "讲个笑话", "有点烦躁"], ["更拼命", "降低期望", "换赛道", "自我怀疑"],
            ["详细计划", "三分钟热度", "凭感觉", "找人监督"], ["假装没见", "礼貌微笑", "怼回去", "内心抓狂"],
            ["瞬间焦虑", "划走不看", "截图吐槽", "思考原因"], ["读心术", "时间暂停", "瞬移", "治愈"],
            ["崩溃大哭", "冷静接受", "创作转化", "找人倾诉"], ["平庸无聊", "动荡孤独", "成功但众叛亲离", "平凡有爱"],
            ["反思自己", "对方不懂我", "我就是我", "沟通消除"], ["独处放空", "朋友疯玩", "运动流汗", "吃顿好的"],
            ["完全相信", "依赖逻辑", "两者结合", "怀疑但信"], ["怀疑目的", "开心接受", "内心狂喜", "尴尬"],
            ["焦虑", "悲伤", "愤怒", "嫉妒"], ["自由又孤独", "成功怕吃苦", "社交又独处", "理性感性拉扯"],
            ["技能不够", "装备差", "队友不行", "设计问题"], ["过程重要", "结果重要", "同样重要", "无所谓"],
            ["理所当然", "不舒服不说", "下次不帮", "直接表达"], ["稳定平淡", "动荡精彩", "摇摆", "看阶段"],
            ["猫", "狼", "树懒", "章鱼"], ["必要调味", "浪费时间", "看心情", "不在意"],
            ["运动发泄", "写日记", "找朋友吐槽", "自我消化"], ["共情力", "创造力", "执行力", "幽默感"],
            ["领导者", "协调者", "执行者", "气氛组"], ["世界末日", "宝贵教训", "人生常态", "逃避"],
            ["可以改变", "早已注定", "小范围改变", "玄学"], ["紧跟潮流", "偶尔用", "不用", "自创梗"],
            ["电影", "音乐", "文字", "戏剧"], ["非常复杂", "简单纯粹", "表面简单内心复杂", "拒绝定义"],
            ["星空", "大海", "森林", "沙漠"], ["学新技能", "朋友聚会", "独自冒险", "宅家刷剧"]
        ];
        let qs = [];
        for (let i = 0; i < 32; i++) {
            let text = scenarios[i % scenarios.length];
            let opts = optTemplates[i % optTemplates.length];
            let options = opts.map((label, optIdx) => {
                let w = zeroVec();
                if (optIdx === 0) { w[2] += 2; w[6] += 2; w[14] += 2; }
                else if (optIdx === 1) { w[3] += 2; w[7] -= 1; w[13] += 1; }
                else if (optIdx === 2) { w[4] += 2; w[9] += 2; w[1] += 2; }
                else { w[5] += 2; w[11] += 2; w[12] += 1; w[2] += 1; }
                w[8] += (i % 3) * 0.6;
                w[13] += (optIdx * 0.4);
                return { label, weights: w.map(v => Math.round(v * 1.5)) };
            });
            qs.push({ text, options });
        }
        return qs;
    }

    const QUESTIONS = generateQuestions();
    let currentIndex = 0;
    let answers = new Array(32).fill(null);
    let testCompleted = false;
    let latestResultData = null; // 存储最新结果用于模态

    // 计算分数
    function computeDimensionScores() {
        let total = zeroVec();
        for (let ans of answers) {
            if (ans && ans.weights) {
                for (let d = 0; d < 15; d++) total[d] += ans.weights[d];
            }
        }
        return total;
    }

    function matchPersonality(scores) {
        let hash = 0;
        for (let i = 0; i < scores.length; i++) {
            hash = ((hash << 5) - hash) + Math.floor(scores[i] * 131);
            hash |= 0;
        }
        let idx = Math.abs(hash) % PERSONALITIES.length;
        let sum = scores.reduce((a,b)=>a+b,0);
        let variance = scores.reduce((a,b)=>a+Math.pow(b- (sum/15),2),0);
        idx = (idx + Math.floor(variance) % 7) % PERSONALITIES.length;
        return PERSONALITIES[idx];
    }

    // 渲染题目界面
    function renderTest() {
        const container = document.getElementById("mainContent");
        if (!container) return;
        if (testCompleted || answers.every(a => a !== null)) {
            if (!testCompleted && answers.every(a => a !== null)) showResultModal();
            return;
        }
        const q = QUESTIONS[currentIndex];
        const selected = answers[currentIndex];
        const percent = (currentIndex / 32) * 100;
        let optsHtml = '';
        q.options.forEach((opt, idx) => {
            const prefix = String.fromCharCode(65+idx);
            optsHtml += `<div class="option-btn" data-opt-index="${idx}"><span class="option-prefix">${prefix}.</span><span>${opt.label}</span></div>`;
        });
        container.innerHTML = `
            <div class="progress-area"><div class="progress-stats"><span>🧩 第 ${currentIndex+1}/32 题</span><span>🎭 15维浸入中</span></div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width: ${percent}%;"></div></div></div>
            <div class="question-card"><div class="question-text">${q.text}</div><div class="options-list" id="optionsList">${optsHtml}</div></div>
            <div class="nav-buttons"><button class="nav-btn" id="prevBtn" ${currentIndex===0 ? 'disabled' : ''}>◀ 上一题</button>
            <button class="nav-btn primary" id="nextBtn">${currentIndex===31 ? '🌌 揭示人格' : '下一题 ▶'}</button></div>
        `;
        document.querySelectorAll('.option-btn').forEach((btn, idx) => {
            btn.addEventListener('click', () => { answers[currentIndex] = q.options[idx]; renderTest(); });
        });
        if (selected) {
            document.querySelectorAll('.option-btn').forEach((btn, idx) => {
                if (q.options[idx] === selected) { btn.style.background = "#f8ede2"; btn.style.borderColor = "#b87c4f"; }
                else { btn.style.background = "#fefaf7"; btn.style.borderColor = "#eedfcb"; }
            });
        }
        document.getElementById("prevBtn")?.addEventListener("click", () => { if(currentIndex>0){ currentIndex--; renderTest(); } });
        document.getElementById("nextBtn")?.addEventListener("click", () => {
            if(!answers[currentIndex]){ alert("随便选一个，玄学需要你的意志～"); return; }
            if(currentIndex < 31) { currentIndex++; renderTest(); }
            else { if(answers[currentIndex]) showResultModal(); else alert("请完成最后一题"); }
        });
    }

    // 显示模态结果并支持图片生成
    function showResultModal() {
        const scores = computeDimensionScores();
        const personality = matchPersonality(scores);
        const topDims = [...scores].map((s,i)=> ({ name: DIMENSIONS[i], score: s })).sort((a,b)=>b.score - a.score).slice(0,3);
        latestResultData = { personality, scores, topDims };
        
        const modalBody = document.getElementById("modalBody");
        modalBody.innerHTML = `
            <div id="shareImageContainer" class="result-share-card">
                <div class="result-tag">✨ SBTI · 玄学全息图谱 ✨</div>
                <div class="result-name">${personality.name}</div>
                <div class="result-sub">${personality.subtitle}</div>
                <div class="result-desc"><strong>📜 人格解析</strong><br>${personality.desc}<br><br>
                <span class="dimension-hint">🔮 主导维度: ${topDims.map(d=>`${d.name}(${d.score})`).join(' · ')}</span></div>
                <div class="share-footer">⚡ 基于15维能量场 · 32道灵魂拷问 · 27种平行自我</div>
            </div>
            <div class="modal-buttons">
                <button class="share-btn" id="generateShareBtn">📸 生成图片分享</button>
                <button class="restart-modal-btn" id="restartFromModalBtn">🔄 重新测试</button>
            </div>
        `;
        document.getElementById("resultModal").classList.add("active");
        
        document.getElementById("generateShareBtn")?.addEventListener("click", () => generateShareImage());
        document.getElementById("restartFromModalBtn")?.addEventListener("click", () => { closeModal(); resetTest(); });
        document.getElementById("closeModalBtn")?.addEventListener("click", () => closeModal());
        // 点击遮罩关闭
        const overlay = document.getElementById("resultModal");
        overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });
    }
    
    async function generateShareImage() {
        const element = document.getElementById("shareImageContainer");
        if(!element) return;
        const btn = document.getElementById("generateShareBtn");
        const originalText = btn.innerText;
        btn.innerText = "✨ 生成中...";
        btn.disabled = true;
        try {
            const canvas = await html2canvas(element, {
                scale: 2.5,
                backgroundColor: '#fffef8',
                logging: false,
                useCORS: false
            });
            const link = document.createElement('a');
            const personalityName = latestResultData?.personality?.name?.replace(/[^a-z0-9]/gi, '_') || 'SBTI';
            link.download = `SBTI_${personalityName}.png`;
            link.href = canvas.toDataURL();
            link.click();
        } catch(err) {
            alert("生成图片失败，可尝试截图保存~");
            console.error(err);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
    
    function closeModal() {
        document.getElementById("resultModal").classList.remove("active");
    }
    
    function resetTest() {
        currentIndex = 0;
        answers = new Array(32).fill(null);
        testCompleted = false;
        latestResultData = null;
        renderTest();
    }
    
    // 启动应用
    renderTest();
</script>
