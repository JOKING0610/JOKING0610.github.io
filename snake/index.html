<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>星云蛇</title>
<style>
  :root{
    --bg:#0a0e1a;
    --accent:#5eead4;
    --accent2:#818cf8;
    --danger:#fb7185;
    --text:#e2e8f0;
    --muted:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--text);user-select:none;-webkit-user-select:none;}
  #game{position:fixed;inset:0;display:block;cursor:default;touch-action:none;}

  .hud{position:fixed;top:18px;left:50%;transform:translateX(-50%);
    display:flex;gap:14px;z-index:10;pointer-events:none;}
  .chip{background:rgba(255,255,255,0.06);
    backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 18px;
    min-width:96px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.35);}
  .chip .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .chip .value{font-size:22px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;}
  .chip.score .value{color:var(--accent);}
  .chip.best .value{color:var(--accent2);}
  .chip.len .value{color:#fcd34d;}

  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:20;gap:18px;text-align:center;
    pointer-events:none;                     /* fix WebKit backdrop-filter blocking child touches */
    background:radial-gradient(circle at 50% 40%,rgba(13,19,38,.65),rgba(10,14,26,.92));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    transition:opacity .35s ease;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  .overlay.hidden > * { pointer-events: none !important; }  /* hidden → children also inert */

  /* re-enable pointer events on interactive containers inside visible overlays */
  .overlay:not(.hidden) > * { pointer-events: auto; }

  /* Start screen is a self-contained screen, fully isolated from the game canvas */
  #overlay{
    background:
      radial-gradient(circle at 28% 30%,rgba(94,234,212,.10),transparent 45%),
      radial-gradient(circle at 72% 75%,rgba(129,140,248,.12),transparent 48%),
      radial-gradient(circle at 50% 50%,#0c1224,#070a14 80%);
    background-size:200% 200%,200% 200%,100% 100%;
    animation:menudrift 22s ease-in-out infinite alternate;}
  @keyframes menudrift{
    from{background-position:0% 0%,100% 100%,0 0;}
    to{background-position:100% 100%,0% 0%,0 0;}}
  .title{font-size:clamp(34px,7vw,64px);font-weight:800;letter-spacing:.02em;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 18px rgba(0,0,0,.5));}

  /* Start screen = horizontal row: [buttons] [snake ornament] [best + history] */
  .menu-row{display:flex;align-items:center;justify-content:flex-start;width:100%;
    gap:clamp(26px,5vw,68px);flex-wrap:wrap;padding:0 24px;position:relative;}
  .menu-actions{position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .btn-ghost{background:rgba(255,255,255,.06);color:var(--text);
    border:1px solid rgba(255,255,255,.16);box-shadow:none;}
  .btn-ghost:hover{background:rgba(255,255,255,.12);box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .skin-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:35;width:220px;background:rgba(13,18,38,.92);border:1px solid rgba(255,255,255,.12);
    border-radius:18px;padding:14px;
    backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
    box-shadow:0 16px 50px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:10px;
    transition:opacity .2s ease,transform .2s ease;}
  .skin-pop::-webkit-scrollbar{width:4px;}
  .skin-pop::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px;}
  .skin-pop.hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) translateY(-6px);}
  .skin-pop-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-align:center;}
  .skin-list{display:flex;flex-direction:column;gap:8px;}
  .skin-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    transition:background .2s,border-color .2s;}
  .skin-item:hover{background:rgba(255,255,255,.09);}
  .skin-item.selected{border-color:var(--accent);background:rgba(94,234,212,.12);}
  .skin-swatch{width:34px;height:34px;border-radius:9px;flex:0 0 34px;box-shadow:0 2px 10px rgba(0,0,0,.3);}
  .skin-name{font-size:14px;font-weight:600;color:var(--text);}

  /* Decorative in-game-snake preview, centred in its column (pure ornament) */
  .preview-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:10px;padding:0;}
  .preview-canvas{display:block;pointer-events:none;}
  .preview-cap{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .menu-stats{display:flex;flex-direction:column;align-items:center;gap:16px;}
  /* 历史记录浮层（点击"历史记录"按钮弹出） */
  .history-mask{position:fixed;inset:0;background:rgba(10,14,26,.55);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:24;
    transition:opacity .2s ease;}
  .history-mask.hidden{opacity:0;pointer-events:none;}
  /* 桌面端显示挂件（手机端也显示，只是更小） */
  @media (max-width:880px){ .preview-wrap{display:flex;gap:8px;} }
  .sub{color:var(--muted);max-width:440px;line-height:1.7;font-size:15px;padding:0 16px;
    text-shadow:0 1px 10px rgba(0,0,0,.6);}
  .sub b{color:var(--text);font-weight:600;}
  .btn{margin-top:6px;pointer-events:auto;cursor:pointer;border:none;border-radius:999px;
    padding:14px 34px;font-size:16px;font-weight:700;color:#06121a;font-family:inherit;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    box-shadow:0 10px 30px rgba(94,234,212,.35);
    transition:transform .2s cubic-bezier(.16,1,.3,1),box-shadow .2s;}
  .btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 14px 40px rgba(129,140,248,.45);}
  .btn:active{transform:scale(.98);}
  /* pause panel buttons share a width for a tidy, centred stack */
  #pausePanel .btn{ min-width:220px; }
  /* 主按钮内嵌两行文字（主标题 + 副标题"最高 N"），使用 flex 列布局 */
  .btn-start{display:inline-flex;flex-direction:column;align-items:center;gap:2px;line-height:1.15;}
  .btn-main{font-size:16px;font-weight:700;}
  .btn-sub{font-size:11px;font-weight:600;letter-spacing:.06em;opacity:.78;}
  .btn-sub b{font-weight:800;font-variant-numeric:tabular-nums;}
  .dead .title{background:linear-gradient(120deg,var(--danger),#f59e0b);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .gameover-stats{display:flex;gap:28px;color:var(--text);}
  .gameover-stats div{font-size:14px;color:var(--muted);}
  .gameover-stats div b{display:block;font-size:30px;color:var(--text);margin-top:4px;font-variant-numeric:tabular-nums;}
  .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:var(--muted);
    font-size:12.5px;z-index:10;letter-spacing:.03em;pointer-events:none;text-align:center;line-height:1.6;}
  .hint kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    border-bottom-width:2px;border-radius:6px;padding:1px 7px;font-family:inherit;font-size:12px;color:var(--text);}

  .best-badge{display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:4px;
    background:rgba(129,140,248,.12);border:1px solid rgba(129,140,248,.32);border-radius:16px;
    padding:10px 30px;box-shadow:0 8px 30px rgba(129,140,248,.18);}
  .best-badge-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .best-badge-value{font-size:36px;font-weight:800;color:var(--accent2);line-height:1;font-variant-numeric:tabular-nums;}

  /* 历史记录面板（基础卡片样式，gameover 界面也用） */
  .history-panel{width:min(360px,86vw);max-height:32vh;margin-top:6px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;
    padding:13px 15px;backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
    box-shadow:0 10px 40px rgba(0,0,0,.3);display:flex;flex-direction:column;}
  /* 浮层形态（覆盖在 menu 之上）：默认隐藏，点击 historyBtn 时居中弹出 */
  #historyPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:25;width:min(360px,86vw);max-height:70vh;margin-top:0;
    background:rgba(13,18,38,.94);border:1px solid rgba(255,255,255,.12);border-radius:18px;
    padding:13px 15px;
    box-shadow:0 16px 50px rgba(0,0,0,.5);
    transition:opacity .2s ease,transform .2s ease;}
  #historyPanel.hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) translateY(-6px);}
  .history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .history-title{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .history-clear{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;
    font-family:inherit;padding:2px 8px;border-radius:7px;transition:color .2s,background .2s;line-height:1;font-weight:400;}
  .history-clear:hover{color:var(--text);background:rgba(255,255,255,.1);}
  .history-list{list-style:none;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px;}
  .history-list::-webkit-scrollbar{width:6px;}
  .history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px;}
  .history-list li{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:11px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);}
  .history-rank{width:24px;height:24px;flex:0 0 24px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:12px;font-weight:700;color:#06121a;
    background:linear-gradient(120deg,var(--accent),var(--accent2));}
  .history-rank.top{background:linear-gradient(120deg,#fbbf24,#f59e0b);color:#1a1304;}
  .history-main{flex:1;text-align:left;}
  .history-score{font-size:15px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
  .history-score span{color:var(--accent);}
  .history-meta{font-size:11px;color:var(--muted);margin-top:1px;}
  .history-empty{color:var(--muted);font-size:13px;padding:14px 6px;text-align:center;}

  .final-rank{margin-top:4px;font-size:15px;font-weight:700;color:var(--accent);}
  .final-rank.new{color:#fbbf24;}
  /* ---- Mobile / small-screen adaptation ---- */
  @media (max-width: 880px) {
    .preview-wrap { display: flex; gap: max(6px, 1.2vw); align-items: center; justify-content: center; }
    .menu-row { gap: max(8px, 2vw); padding: 0 max(10px, 2vw); flex-wrap: nowrap; }
    .menu-actions { gap: max(6px, 1.2vw); align-items: stretch; }
    .menu-stats { gap: max(8px, 1.5vw); align-items: center; }
    #historyPanel { max-height: 60vh; padding: 12px 14px; border-radius: 16px; }
    .best-badge { padding: 8px 20px; border-radius: 14px; }
    .history-list li { padding: 5px 8px; }
    .history-score { font-size: 14px; }
    .history-meta { font-size: 10px; }
    .history-rank { width: 22px; height: 22px; flex: 0 0 22px; font-size: 11px; }
    .skin-pop { max-height: min(50vh, 260px); overflow-y: auto; }
  }
  @media (max-width: 600px) {
    .hud { gap: max(4px, 0.8vw); top: max(6px, env(safe-area-inset-top)); }
    .chip { padding: max(3px, 0.6vw) max(6px, 1.2vw); min-width: max(48px, 10vw); border-radius: max(8px, 1.2vw); }
    .chip .label { font-size: max(8px, 1.6vw); letter-spacing: .04em; }
    .chip .value { font-size: max(13px, 2.6vw); }
    .btn-main { font-size: max(12px, 2.4vw); }
    .btn-sub { font-size: max(9px, 1.8vw); }
    .best-badge-value { font-size: max(20px, 4vw); }
    .best-badge-label { font-size: max(9px, 1.6vw); letter-spacing: .12em; }
    .menu-stats { gap: max(6px, 1.2vw); }
    .menu-row { gap: max(6px, 1.5vw); padding: 0 max(6px, 1.5vw); flex-wrap: nowrap; }
    .menu-actions { gap: max(5px, 1vw); align-items: stretch; }
    .menu-actions .btn,
    .menu-actions .btn-ghost { width: 100%; padding: max(8px, 1.6vw) max(18px, 3.6vw); font-size: max(12px, 2.4vw); }
    #historyPanel { max-height: 70vh; width: min(92vw, 360px); padding: 10px 12px; border-radius: 14px; }
    .history-head { margin-bottom: 6px; }
    .history-title { font-size: 11px; }
    .history-clear { font-size: 14px; }
    .history-list { gap: 4px; }
    .hint { display: none; }
    #overlay { padding: max(8px, 1.5vw); padding-top: max(8px, env(safe-area-inset-top)); padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .skin-pop { width: min(86vw, 220px); max-height: min(55vh, 280px); overflow-y: auto; }
  }
  @media (pointer: coarse) { .hint { display: none !important; } }
  /* ---- Mobile on-screen controls (touch devices only) ---- */
  .mobile-controls { display: none; }
  @media (pointer: coarse) {
    .mobile-controls {
      display: block; position: fixed; inset: 0; z-index: 15;
      pointer-events: none;   /* only the joystick + boost button capture touches; the rest passes to the canvas */
    }
  }
  #joystick {
    position: fixed; left: max(14px, env(safe-area-inset-left));
    bottom: max(20px, env(safe-area-inset-bottom));
    width: clamp(96px, 14vw, 140px); height: clamp(96px, 14vw, 140px); z-index: 15; touch-action: none; pointer-events: auto;
  }
  #joyBase {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
    backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%);
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  #joyKnob {
    position: absolute; left: 50%; top: 50%; width: 42%; height: 42%; margin: -21% 0 0 -21%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 6px 22px rgba(94,234,212,.45);
    will-change: transform;
  }
  #boostBtn {
    position: fixed; right: max(14px, env(safe-area-inset-right));
    bottom: max(30px, env(safe-area-inset-bottom));
    width: clamp(64px, 10vw, 100px); height: clamp(64px, 10vw, 100px); border-radius: 50%; z-index: 15;
    display: flex; align-items: center; justify-content: center;
    background: rgba(234,179,8,.16); border: 1px solid rgba(234,179,8,.5);
    color: #eab308; font-size: 15px; font-weight: 700; letter-spacing: .1em;
    backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%);
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
    pointer-events: auto; user-select: none; -webkit-user-select: none; touch-action: none;
    transition: transform .12s ease, background .12s ease;
  }
  #boostBtn.active { transform: scale(.92); background: rgba(234,179,8,.34); }
  #boostBtn svg { width: 48%; height: 48%; display: block; fill: currentColor; }

  /* ---- Force landscape on mobile: a rotate-prompt overlay shown only in portrait on
         touch devices. CSS-driven (no Screen Orientation API lock, which only works in
         fullscreen and breaks on most mobile browsers). ---- */
  .rotate-prompt {
    display: none;
    position: fixed; inset: 0; z-index: 60;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 40%, #0c1224, #070a14 80%);
    color: var(--text);
  }
  .rotate-prompt .rot-icon {
    width: 66px; height: 66px; border: 3px solid var(--accent); border-radius: 13px;
    position: relative; animation: rotateHint 2.2s ease-in-out infinite;
  }
  .rotate-prompt .rot-icon::after {
    content: ""; position: absolute; inset: 9px; border-radius: 7px;
    border: 2px solid var(--accent2); opacity: .7;
  }
  @keyframes rotateHint {
    0%, 35% { transform: rotate(0deg); }
    65%, 100% { transform: rotate(-90deg); }
  }
  .rotate-prompt .rot-title { font-size: 21px; font-weight: 700; letter-spacing: .04em; }
  .rotate-prompt .rot-sub { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.7; }

  @media (orientation: portrait) and (pointer: coarse) {
    .rotate-prompt { display: flex; }
  }

  /* stop iOS long-press callout / accidental zoom on the touch UI */
  .overlay, .btn, .skin-pop, .skin-item, .mobile-controls, #joystick, #boostBtn, .rotate-prompt, #pauseBtn { -webkit-touch-callout: none; touch-action: manipulation; }

  /* ---- Pause button (top-left, visible during play only, touch-only) ---- */
  #pauseBtn {
    position: fixed; top: max(10px, env(safe-area-inset-top)); left: max(10px, env(safe-area-inset-left));
    z-index: 12; width: clamp(36px, 5vw, 44px); height: clamp(36px, 5vw, 44px); border-radius: 50%;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06); backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    color: var(--text); font-size: clamp(16px, 2.4vw, 20px); cursor: pointer; display: none;
    align-items: center; justify-content: center; line-height: 1;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    transition: background .2s, transform .2s;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  #pauseBtn:hover { background: rgba(255,255,255,.12); transform: scale(1.05); }
  #pauseBtn:active { transform: scale(.93); }
  #pauseBtn.visible { display: flex; }
  @media (pointer: fine) { #pauseBtn.visible { display: none !important; } }  /* desktop hides it */

</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="chip score"><div class="label">分数</div><div class="value" id="score">0</div></div>
  <div class="chip len"><div class="label">长度</div><div class="value" id="len">0</div></div>
  <div class="chip best"><div class="label">最高分</div><div class="value" id="best">0</div></div>
</div>

<button id="pauseBtn">⏸</button>

<div class="overlay" id="overlay">
  <div class="menu-row">
    <!-- 最左侧：操作按钮 -->
    <div class="menu-actions">
      <button class="btn btn-start" id="startBtn">
        <span class="btn-main">开始游戏</span>
        <span class="btn-sub">最高 <b id="menuBest">0</b></span>
      </button>
      <button class="btn btn-ghost" id="skinBtn">皮肤设置</button>
      <button class="btn btn-ghost" id="historyBtn">历史记录</button>
      <div class="skin-pop hidden" id="skinPop">
        <div class="skin-pop-title">选择蛇皮肤</div>
        <div class="skin-list" id="skinList"></div>
      </div>
    </div>
    <!-- 按钮右侧：游戏内蛇挂件 -->
    <div class="preview-wrap">
      <canvas id="preview" class="preview-canvas"></canvas>
    </div>
  </div>
</div>

<div class="overlay dead hidden" id="gameover">
  <div class="title">游戏结束</div>
  <div class="gameover-stats">
    <div>本局分数<b id="finalScore">0</b></div>
    <div>最高分<b id="finalBest">0</b></div>
  </div>
  <div class="final-rank" id="finalRank"></div>
  <div class="history-panel">
    <div class="history-head">
      <span class="history-title">本局战绩榜</span>
    </div>
    <ul class="history-list" id="historyList2"></ul>
    <div class="history-empty" id="historyEmpty2">—</div>
  </div>
  <button class="btn" id="restartBtn">再来一局</button>
</div>

<!-- Pause panel: opened by Esc, offers resume or end-game -->
<div class="overlay hidden" id="pausePanel">
  <div class="title">已暂停</div>
  <button class="btn" id="resumeBtn">继续游戏</button>
  <button class="btn btn-ghost" id="endBtn">结束游戏</button>
</div>

<div class="hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 转向 · 按住<kbd>Shift</kbd>/<kbd>空格</kbd> 加速 · 金光<b>特殊食物</b>+50 · <kbd>Esc</kbd> 暂停</div>

<!-- Mobile on-screen controls (touch devices only): left directional joystick + right boost button -->
<div class="mobile-controls" id="mobileControls" aria-hidden="true">
  <div id="joystick"><div id="joyBase"></div><div id="joyKnob"></div></div>

  <div class="rot-icon"></div>
  <div class="rot-title">请横屏游玩</div>
  <div class="rot-sub">本游戏为横屏设计，请将手机旋转至横屏方向以获得最佳体验。</div>
</div>

<script src="food-icons.js"></script>
<script>
(() => {
  'use strict';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;

  // static layers (background + vignette) are pre-rendered once and blitted each frame
  const bgCanvas = document.createElement('canvas');
  const vigCanvas = document.createElement('canvas');
  // normal-food glyphs are cached as sprites keyed by (icon, quantized hue) so we
  // drawImage instead of re-rasterising a web-font glyph for every visible food each frame
  const foodSpriteCache = new Map();
  function buildStatics() {
    bgCanvas.width = Math.floor(W * dpr); bgCanvas.height = Math.floor(H * dpr);
    const b = bgCanvas.getContext('2d');
    b.setTransform(dpr, 0, 0, dpr, 0, 0);
    const bg = b.createRadialGradient(W / 2, H * 0.42, 50, W / 2, H / 2, Math.max(W, H) * 0.75);
    bg.addColorStop(0, '#0d1326'); bg.addColorStop(1, '#070a14');
    b.fillStyle = bg; b.fillRect(0, 0, W, H);

    vigCanvas.width = Math.floor(W * dpr); vigCanvas.height = Math.floor(H * dpr);
    const v = vigCanvas.getContext('2d');
    v.setTransform(dpr, 0, 0, dpr, 0, 0);
    const vg = v.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.34, W / 2, H / 2, Math.max(W, H) * 0.74);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.5)');
    v.fillStyle = vg; v.fillRect(0, 0, W, H);
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 1.75);  // cap at 1.75 (not 2) — visibly crisp on retina, ~24% fewer pixels to fill
    W = window.innerWidth || document.documentElement.clientWidth || 1280;
    H = window.innerHeight || document.documentElement.clientHeight || 720;
    if (!isFinite(W) || W < 1) W = 1280;
    if (!isFinite(H) || H < 1) H = 720;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildStatics();
    foodSpriteCache.clear();
  }
  // ---- Start-screen decorative snake (independent canvas, pure ornament, never touches game state) ----
  const pcv = document.getElementById('preview');
  const pctx = pcv.getContext('2d');
  let pW = 0, pH = 0;
  function sizePreview() {
    const d = Math.min(window.devicePixelRatio || 1, 1.75);  // match resize()'s dpr cap
    // 全设备按视口宽度自适应；加大约 5 倍面积（线性约 2.2x）
    let cssW, cssH;
    const iw = window.innerWidth;
    if (iw <= 600)      { cssW = Math.max(60, Math.min(110, iw * 0.18)); }
    else if (iw <= 880) { cssW = Math.max(90, Math.min(150, iw * 0.16)); }
    else                { cssW = Math.max(140, Math.min(260, iw * 0.13)); }
    cssH = cssW * 2;
    pcv.style.width = cssW + 'px';
    pcv.style.height = cssH + 'px';
    pcv.width = Math.floor(cssW * d);
    pcv.height = Math.floor(cssH * d);
    pctx.setTransform(d, 0, 0, d, 0, 0);
    pW = cssW; pH = cssH;
  }
  // straight vertical snake, head up. Snake is centred in the canvas, head radius scales with canvas.
  function drawPreview(time) {
    pctx.clearRect(0, 0, pW, pH);
    const segs = 15, baseX = pW / 2;
    // 蛇头半径、上下 padding 都按画布高度比例缩放；小画布上蛇身变细，避免段之间重叠
    const pHeadR = Math.max(2, pH * 0.027);
    const padding = Math.max(4, pH * 0.1);
    const span = pH - padding * 2;
    const pts = [];
    for (let i = 0; i < segs; i++) {
      const frac = i / (segs - 1);
      const y = padding + frac * span;                    // centred
      pts.push({ x: baseX, y });
    }
    // acceleration effect: every 8s loop, the last 3s glow brighter (matches in-game boost)
    const boosting = (time % 8) >= 5;
    // ornament uses the current skin so it matches the in-game snake exactly
    paintSnake(pctx, pts, currentSkin, time * 36, -Math.PI / 2, boosting, pHeadR);
  }

  window.addEventListener('resize', () => { resize(); sizePreview(); });
  resize();
  sizePreview();

  // ---- State machine ----
  const STATE = { MENU: 0, PLAY: 1, PAUSE: 2, DEAD: 3 };
  let state = STATE.MENU;

  const cfg = {
    speed: 200,        // px/s base
    boost: 1.9,        // boost multiplier
    turn: 8,           // rad/s keyboard turn (higher = tighter radius)
    steer: 15,         // steering responsiveness: smaller => a little turn radius (gentle curve)
    headR: 7,
    snakeLen0: 170,    // initial length (px)
    grow: 22,          // px gained per normal food
    foodCount: 1200,  // 食物数量翻倍（原 600）；密集度更高，仍是简单循环迭代
    foodR: 9,
    foodRespawnDelay: 3,  // seconds before an eaten normal food respawns (no instant refill)
    cell: 40,          // px per grid cell
    gridN: 100,        // 100 x 100 cells => a big world; the view only shows a window of it
    special: {
      min: 5, max: 9,     // respawn interval (s) — 缩短一半，特殊食物出现更频繁
      ttl: 14,            // lifetime before it vanishes if uneaten (s)
      maxOnField: 20,     // how many special foods at once — 由 10 增至 20
      rMul: 1.8,          // bigger than normal food
      value: 50,          // score bonus
      growMul: 2.5,       // extra growth vs normal
    },
  };

  // ---- World: the 100x100 cell map (a large world; the camera only reveals a window) ----
  const worldW = cfg.cell * cfg.gridN;   // 4000 px
  const worldH = worldW;
  const cam = { x: 0, y: 0 };            // top-left of the visible window, in world coordinates
  let camZoom = 1, camW = 0, camH = 0;   // live zoom + the visible world size (derived from zoom)
  let viewZoom = 1;                       // smoothed zoom actually used by the camera (eases toward currentZoom())

  // ---- Snake skins (default + 2 new) ----
  const SKINS = [
    // 霓虹：经典青→靛渐变，吃到食物后色相流动（动态）
    { id: 'neon',   name: '霓虹', baseHue: 168, span: 50,  sat: 85, light: 62, shadowSat: 90, advance: 18 },
    // 熔岩：炽热红橙，锁定暖色，不吃食物也不变色
    { id: 'lava',   name: '熔岩', baseHue: 14,  span: 38,  sat: 92, light: 58, shadowSat: 90, advance: 0 },
    // 极光：紫→粉→蓝的宽幅渐变，锁定冷色，华丽飘带感
    { id: 'aurora', name: '极光', baseHue: 265, span: 135, sat: 82, light: 64, shadowSat: 88, advance: 0 },
  ];
  let currentSkin = SKINS[0];
  try {
    const sid = localStorage.getItem('snake360_skin');
    const found = SKINS.find(s => s.id === sid);
    if (found) currentSkin = found;
  } catch (e) { /* keep default */ }

  let head, angle, targetAngle, speed, snakeLen, score, trail, foods, hue, boosting, boostHeld, last;
  let specialTimer = 0, popups = [];
  let foodRespawnQueue = [];   // per-food countdown timers for delayed respawn of eaten normals
  let best = parseInt(localStorage.getItem('snake360_best') || '0', 10) || 0;

  const HISTORY_KEY = 'snake360_history';
  const HISTORY_MAX = 12;
  let history = [];
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (Array.isArray(parsed)) history = parsed;
  } catch (e) { history = []; }

  const rand = (a, b) => a + Math.random() * (b - a);

  // --- Local icon library ("570+图标-v1.0.3") as inline SVG --------------------------------------
  // Real, recognisable food art. Each icon's white fill is recoloured to the food's hue at draw
  // time (see getIconImg), so the field reads as colour-coded food. Fully offline, no CDN.
  const NORMAL_ICONS = [
    '7.自然与饮食/苹果', '7.自然与饮食/梨', '7.自然与饮食/桃子', '7.自然与饮食/胡萝卜',
    '7.自然与饮食/土豆', '7.自然与饮食/面包', '7.自然与饮食/火腿', '7.自然与饮食/肉',
    '7.自然与饮食/虾', '7.自然与饮食/鱼', '7.自然与饮食/鱼2',
  ];
  const SPECIAL_DEFS = [
    { hue: 45,  key: '6.物品/钻石' }, // gold    · diamond
    { hue: 320, key: '6.物品/王冠' }, // magenta · crown
    { hue: 175, key: '6.物品/星币' }, // teal    · star coin
  ];

  // recoloured SVG <img> elements, keyed by `${key}|${hueBucket}` (created lazily).
  // Bucket step = 30° (24 buckets) so the icon cache stays small even with many foods
  // across the full hue range.
  const iconImages = new Map();
  function getIconImg(key, hue) {
    const bucket = Math.round(hue / 30) * 30;     // quantise hue to 30° buckets (~24 colours)
    const cacheKey = key + '|' + bucket;
    let img = iconImages.get(cacheKey);
    if (!img) {
      const svg = (window.FOOD_ICON_SVG && window.FOOD_ICON_SVG[key]) || '';
      // bump intrinsic size so the rasterised SVG stays crisp, and tint white -> hue
      const colored = svg
        .replace(/width="\d+"/, 'width="64"')
        .replace(/height="\d+"/, 'height="64"')
        .replace(/fill="white"/g, `fill="hsl(${hue},85%,62%)"`)
        .replace(/fill='white'/g, `fill='hsl(${hue},85%,62%)'`)
        .replace(/fill="#fff"/gi, `fill="hsl(${hue},85%,62%)"`)
        .replace(/fill="#ffffff"/gi, `fill="hsl(${hue},85%,62%)"`);
      img = new Image();
      img.src = 'data:image/svg+xml,' + encodeURIComponent(colored);
      iconImages.set(cacheKey, img);
    }
    return img;
  }

  function spawnFood(type = 'normal') {
    const margin = 60;
    if (type === 'special') {
      const def = SPECIAL_DEFS[Math.floor(rand(0, SPECIAL_DEFS.length))];
      const iconSrc = def.key;
      getIconImg(iconSrc, def.hue); // start loading the recoloured icon up front
      return {
        x: rand(margin, worldW - margin),
        y: rand(margin, worldH - margin),
        r: cfg.foodR * cfg.special.rMul,
        hue: def.hue,
        iconSrc,
        phase: rand(0, Math.PI * 2),
        special: true,
        value: cfg.special.value,
        growAmt: cfg.grow * cfg.special.growMul,
        ttl: cfg.special.ttl,
        ttlMax: cfg.special.ttl,
      };
    }
    // normal food: random initial size, but never larger than a special food
    const specialR = cfg.foodR * cfg.special.rMul;
    const iconSrc = NORMAL_ICONS[Math.floor(rand(0, NORMAL_ICONS.length))];
    getIconImg(iconSrc, hue);       // start loading the recoloured icon up front
    return {
      x: rand(margin, worldW - margin),
      y: rand(margin, worldH - margin),
      r: rand(cfg.foodR * 0.7, specialR * 0.85),
      hue: rand(0, 360),
      iconSrc,
      phase: rand(0, Math.PI * 2),
      special: false,
    };
  }

  function reset() {
    head = { x: worldW / 2, y: worldH / 2 };
    angle = -Math.PI / 2;       // face up
    targetAngle = angle;
    speed = cfg.speed;
    snakeLen = cfg.snakeLen0;
    score = 0;
    trail = [{ x: head.x, y: head.y }];
    hue = 0;
    boosting = false;
    boostHeld = false;
    foods = [];
    foodRespawnQueue = [];
    for (let i = 0; i < cfg.foodCount; i++) foods.push(spawnFood());
    specialTimer = rand(cfg.special.min, cfg.special.max);
    popups = [];
    viewZoom = currentZoom();      // start each run at the standard view (no leftover zoom from last game)
    centerCamera();
    updateHUD();
  }

  // Base view height in world units. Fixing it (instead of using W/camZoom) keeps the visible
  // world area constant regardless of screen size, so the snake doesn't shrink on big monitors
  // and the playfield doesn't change with the window. The on-screen px size then follows
  // the screen, but the *world* view stays the same.
  const BASE_VIEW_H = 720;
  // keep the camera centered on the snake head, clamped to the world bounds
  function centerCamera() {
    const aspect = W / H;
    // 1) base view in world units, aspect-matched to the screen.
    //    NOTE: assign the SHARED outer `camW`/`camH` (declared at the top) — do NOT
    //    re-declare them with `let`, or drawGrid/drawFoods would cull against the
    //    stale 0-values and the world would render empty.
    camH = BASE_VIEW_H;
    camW = camH * aspect;
    // 2) a bigger snake widens the view — use the SMOOTHED viewZoom so the camera
    //    pulls back slowly instead of snapping when the snake suddenly grows.
    camW /= viewZoom;
    camH /= viewZoom;
    // 3) if the view would exceed the world, clamp it to the world and recompute aspect
    if (camW > worldW) { camW = worldW; camH = camW / aspect; }
    if (camH > worldH) { camH = worldH; camW = camH * aspect; }
    // 4) camera scale = screen-px / world-unit
    camZoom = W / camW;
    // 5) center on the head, clamped to world bounds
    cam.x = camW >= worldW ? (worldW - camW) / 2 : Math.max(0, Math.min(head.x - camW / 2, worldW - camW));
    cam.y = camH >= worldH ? (worldH - camH) / 2 : Math.max(0, Math.min(head.y - camH / 2, worldH - camH));
  }

  // ---- Input ----
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ') { e.preventDefault(); }                       // hold Space = boost (read each frame in update)
    if (e.key === 'Escape') {
      e.preventDefault();
      if (state === STATE.PLAY || state === STATE.PAUSE) togglePause();
    }
    if (e.key === 'Enter') {
      if (state === STATE.MENU || state === STATE.DEAD) { e.preventDefault(); start(); }
    }
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  // (Canvas touch steering removed: on mobile the snake is driven ONLY by the on-screen
  // joystick + boost button below. The canvas keeps `touch-action: none` so taps there do
  // nothing and never scroll/zoom the page.)

  // ---- On-screen mobile controls: left joystick (direction) + right boost button ----
  // Shown via CSS `@media (pointer: coarse)`; they are DOM overlays above the canvas,
  // so their touches never reach the canvas handlers (no double-steering).
  const joyEl = document.getElementById('joystick');
  const joyKnob = document.getElementById('joyKnob');
  const joy = { active: false, angle: -Math.PI / 2, id: null };
  function joyMoveTo(clientX, clientY) {
    const rect = joyEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    let dx = clientX - cx, dy = clientY - cy;
    const max = rect.width / 2;
    const dist = Math.hypot(dx, dy);
    if (dist > max) { dx = dx / dist * max; dy = dy / dist * max; }
    joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    if (dist > 6) joy.angle = Math.atan2(dy, dx);   // dead-zone near centre keeps the last heading
  }
  function joyStart(e) {
    if (e.cancelable) e.preventDefault();
    const t = e.changedTouches ? e.changedTouches[0] : e;
    joy.id = (t.identifier !== undefined) ? t.identifier : 'm';
    joy.active = true;
    joyMoveTo(t.clientX, t.clientY);
  }
  function joyMove(e) {
    if (!joy.active) return;
    if (e.cancelable) e.preventDefault();
    if (e.changedTouches) {
      for (const ct of e.changedTouches) if (ct.identifier === joy.id) { joyMoveTo(ct.clientX, ct.clientY); break; }
    } else {
      joyMoveTo(e.clientX, e.clientY);
    }
  }
  function joyEnd(e) {
    if (e.cancelable) e.preventDefault();
    joy.active = false; joy.id = null;
    joyKnob.style.transform = 'translate(0px, 0px)';
  }
  joyEl.addEventListener('touchstart', joyStart, { passive: false });
  joyEl.addEventListener('touchmove', joyMove, { passive: false });
  joyEl.addEventListener('touchend', joyEnd, { passive: false });
  joyEl.addEventListener('touchcancel', joyEnd, { passive: false });
  // Mouse fallback is ONLY for desktop debugging. Touch devices must not respond to
  // compatibility mouse events (synthesised ~300ms after a tap) — otherwise lifting the
  // finger re-activates steering via a ghost mousedown. Gate on a real fine pointer.
  const finePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (finePointer) {
    joyEl.addEventListener('mousedown', joyStart);
    window.addEventListener('mousemove', e => { if (joy.active) joyMove(e); });
    window.addEventListener('mouseup', joyEnd);
  }

  const boostBtn = document.getElementById('boostBtn');
  function boostOn(e) { if (e.cancelable) e.preventDefault(); boostHeld = true; boostBtn.classList.add('active'); }
  function boostOff(e) { if (e.cancelable) e.preventDefault(); boostHeld = false; boostBtn.classList.remove('active'); }
  boostBtn.addEventListener('touchstart', boostOn, { passive: false });
  boostBtn.addEventListener('touchend', boostOff, { passive: false });
  boostBtn.addEventListener('touchcancel', boostOff, { passive: false });
  if (finePointer) {
    boostBtn.addEventListener('mousedown', boostOn);
    window.addEventListener('mouseup', boostOff);
  }

  function lerpAngle(a, b, t) {
    let d = ((b - a + Math.PI) % (2 * Math.PI)) - Math.PI;
    if (d < -Math.PI) d += 2 * Math.PI;
    return a + d * t;
  }

  // ---- Update ----
  function update(dt) {
    if (state !== STATE.PLAY) return;   // the real snake only lives during play; the menu is a separate screen

    // steering: WASD absolute aim (desktop). The on-screen joystick is the mobile
    // fallback and only kicks in when no WASD key is held, so the keyboard always wins
    // (previously WASD lived inside an `else (joy.active)` branch and got silenced
    // whenever the joystick was active — e.g. on touch-capable laptops).
    const wx = (keys['d'] || keys['D'] ? 1 : 0) - (keys['a'] || keys['A'] ? 1 : 0);
    const wy = (keys['s'] || keys['S'] ? 1 : 0) - (keys['w'] || keys['W'] ? 1 : 0);
    if (wx || wy) {
      targetAngle = Math.atan2(wy, wx);
    } else if (joy.active) {
      targetAngle = joy.angle;
    }
    // steer responsiveness (cfg.steer) is high so the turning radius is near zero
    angle = lerpAngle(angle, targetAngle, Math.min(1, dt * cfg.steer));

    boosting = !!keys['Shift'] || !!keys[' '] || boostHeld;   // hold Shift or Space (or the mobile boost button) to accelerate; release to restore
    const curSpeed = speed * (boosting ? cfg.boost : 1);

    // advance head
    head.x += Math.cos(angle) * curSpeed * dt;
    head.y += Math.sin(angle) * curSpeed * dt;

    // safety: if anything ever produced a non-finite coordinate, recover immediately
    // (otherwise NaN would spread into the trail and poison every later frame)
    if (!isFinite(head.x) || !isFinite(head.y)) {
      head = { x: worldW / 2, y: worldH / 2 };
      angle = targetAngle = -Math.PI / 2;
      trail = [{ x: head.x, y: head.y }];
    }

    // wall collision — the world bounds are the 100x100 grid edges
    const r = currentHeadR();
    if (head.x < r || head.x > worldW - r || head.y < r || head.y > worldH - r) { die(); return; }

    // ease the camera zoom slowly toward its target so the view pulls back gradually
    // as the snake grows (and never snaps, even when a special food adds length at once).
    // dt*0.6 => a soft, second-scale glide; the bigger the gap, the faster it catches up.
    viewZoom += (currentZoom() - viewZoom) * Math.min(1, dt * 0.6);

    // keep the camera glued to the snake as it moves through the big world
    centerCamera();

    // record trail (newest first)
    trail.unshift({ x: head.x, y: head.y });

    // trim trail to snakeLen
    let acc = 0;
    for (let i = 1; i < trail.length; i++) {
      acc += Math.hypot(trail[i].x - trail[i - 1].x, trail[i].y - trail[i - 1].y);
      if (acc > snakeLen) { trail.length = i + 1; break; }
    }

    // self collision disabled by design: snake can pass through its own body

    // delayed respawn of eaten normal foods: each entry is a countdown; when it hits
    // zero a fresh food appears. This avoids an instant-conveyor feel and lets the
    // field thin out briefly after a feeding spree.
    for (let i = foodRespawnQueue.length - 1; i >= 0; i--) {
      foodRespawnQueue[i] -= dt;
      if (foodRespawnQueue[i] <= 0) {
        foodRespawnQueue.splice(i, 1);
        foods.push(spawnFood('normal'));
      }
    }

    // special-food spawner — keeps a couple of rare treats on the field
    specialTimer -= dt;
    if (specialTimer <= 0) {
      const onField = foods.reduce((n, f) => n + (f.special ? 1 : 0), 0);
      if (onField < cfg.special.maxOnField) foods.push(spawnFood('special'));
      specialTimer = rand(cfg.special.min, cfg.special.max);
    }

    // eat food — iterate backwards so splice() stays safe
    for (let i = foods.length - 1; i >= 0; i--) {
      const f = foods[i];
      if (f.special) {
        f.ttl -= dt;
        if (f.ttl <= 0) { foods.splice(i, 1); continue; }  // special is extra; just vanish
      }
      const dx = f.x - head.x, dy = f.y - head.y;
      const rr = f.r + currentHeadR();
      if (dx * dx + dy * dy < rr * rr) {
        if (f.special) {
          score += f.value;
          snakeLen += f.growAmt;
          popups.push({ x: f.x, y: f.y, text: '+' + f.value, life: 1, hue: f.hue });
          foods.splice(i, 1);                // special is extra; no respawn
        } else {
          // normal food: reward scales with its size (bigger food => more score & growth)
          const sizeMul = f.r / cfg.foodR;
          const gained = Math.max(1, Math.round(10 * sizeMul));
          score += gained;
          snakeLen += cfg.grow * sizeMul;
          popups.push({ x: f.x, y: f.y, text: '+' + gained, life: 1, hue: f.hue });
          foods.splice(i, 1);
          // do NOT instantly refill — queue a delayed respawn so the world gets a short breather
          foodRespawnQueue.push(cfg.foodRespawnDelay + rand(0, 1.5));
        }
        speed = Math.min(cfg.speed * 2.2, cfg.speed + score * 0.6);
        hue = (hue + 18) % 360;
        updateHUD();
      }
    }

    // float the score popups upward and fade them out
    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i];
      p.life -= dt * 0.9;
      p.y -= 26 * dt;
      if (p.life <= 0) popups.splice(i, 1);
    }
  }

  // record the finished run into best + history; returns rank info
  function recordRun() {
    const isNewBest = score > best;
    if (isNewBest) { best = score; localStorage.setItem('snake360_best', String(best)); }
    const ts = Date.now();
    history.push({ score, len: Math.round(snakeLen), ts });
    history.sort((a, b) => b.score - a.score);
    if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    const rank = history.findIndex(r => r.ts === ts) + 1;
    return { isNewBest, rank };
  }

  function die() {
    state = STATE.DEAD;
    const { isNewBest, rank } = recordRun();
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = best;
    const rankEl = document.getElementById('finalRank');
    if (isNewBest) { rankEl.textContent = '★ 新纪录！'; rankEl.className = 'final-rank new'; }
    else { rankEl.textContent = '本局排名 #' + rank; rankEl.className = 'final-rank'; }
    document.getElementById('gameover').classList.remove('hidden');
    updateHUD();
    renderHistory();
    updatePauseBtn();
  }

  // Esc: end the game (score is recorded) and return straight to the start screen
  function quitToMenu() {
    if (state === STATE.MENU) return;
    if (state === STATE.PLAY || state === STATE.PAUSE) recordRun();
    reset();                       // re-init state so the next game starts clean
    state = STATE.MENU;
    document.getElementById('finalRank').textContent = '';
    document.getElementById('gameover').classList.add('hidden');
    document.getElementById('pausePanel').classList.add('hidden');
    document.getElementById('overlay').classList.remove('hidden');
    updateHUD();
    renderHistory();
    updatePauseBtn();
  }

  function togglePause() {
    const panel = document.getElementById('pausePanel');
    if (state === STATE.PLAY) {
      state = STATE.PAUSE;
      panel.classList.remove('hidden');
    } else if (state === STATE.PAUSE) {
      state = STATE.PLAY;
      last = performance.now();   // avoid a dt spike right after un-pausing
      panel.classList.add('hidden');
    }
    updatePauseBtn();
  }

  // ---- Draw ----
  function drawGrid() {
    ctx.save();
    const step = cfg.cell;
    // only draw the slice of the grid that is currently visible (cheap + clean edges)
    const x0 = Math.max(0, Math.floor(cam.x / step) * step);
    const x1 = Math.min(worldW, cam.x + camW);
    const y0 = Math.max(0, Math.floor(cam.y / step) * step);
    const y1 = Math.min(worldH, cam.y + camH);
    ctx.strokeStyle = 'rgba(255,255,255,0.045)';
    ctx.lineWidth = 1 / camZoom;
    ctx.beginPath();
    for (let x = x0; x <= x1; x += step) { ctx.moveTo(x, y0); ctx.lineTo(x, y1); }
    for (let y = y0; y <= y1; y += step) { ctx.moveTo(x0, y); ctx.lineTo(x1, y); }
    ctx.stroke();
    // the 100x100 world border — crossing it ends the run
    ctx.strokeStyle = 'rgba(94,234,212,0.5)';
    ctx.lineWidth = 3 / camZoom;
    ctx.strokeRect(0, 0, worldW, worldH);
    ctx.restore();
  }

  // --- normal-food glyph sprite cache (perf: avoid per-frame web-font rasterisation) ---
  const SPRITE_REF_R = 14;                       // radius the sprite is rendered at
  const SPRITE_PAD = 14;                         // padding for the glow
  const SPRITE_SIZE = (SPRITE_REF_R + SPRITE_PAD) * 2;
  function getFoodSprite(src, hue) {
    const bucket = Math.round(hue / 30) * 30;     // match getIconImg's bucket so the sprite and source image agree
    const key = src + '|' + bucket;
    let c = foodSpriteCache.get(key);
    if (c) return c;
    const img = getIconImg(src, hue);            // recoloured SVG for this food
    if (!img || !img.complete || img.naturalWidth === 0) return null;  // not ready yet; caller shows a dot
    c = document.createElement('canvas');
    c.width = Math.floor(SPRITE_SIZE * dpr);
    c.height = Math.floor(SPRITE_SIZE * dpr);
    const g = c.getContext('2d');
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    // the recoloured food icon, centred at the reference size (no outer glow)
    const s = SPRITE_REF_R * 2;
    g.drawImage(img, SPRITE_SIZE / 2 - s / 2, SPRITE_SIZE / 2 - s / 2, s, s);
    foodSpriteCache.set(key, c);
    return c;
  }

  function drawFoods(time) {
    if (!foods) return;
    // only draw foods inside the visible camera window (with a small margin) — keeps
    // the per-frame cost flat no matter how many foods exist across the 100x100 world
    const vx0 = cam.x - 40, vy0 = cam.y - 40, vx1 = cam.x + camW + 40, vy1 = cam.y + camH + 40;
    // set the common ctx state ONCE per frame instead of save()/restore() per food
    // (each save/restore on a 600-food frame is real overhead)
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    for (const f of foods) {
      if (f.x < vx0 || f.x > vx1 || f.y < vy0 || f.y > vy1) continue;
      // normal food keeps a fixed size; only the special food breathes subtly
      const r = f.special ? f.r * (1 + 0.18 * Math.sin(time * 4 + f.phase)) : f.r;
      if (f.special) {
        // lifetime ring: shrinks as the special food is about to vanish
        const frac = Math.max(0, f.ttl / f.ttlMax);
        ctx.strokeStyle = `hsla(${f.hue},90%,72%,0.9)`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(f.x, f.y, r + 9, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
        ctx.stroke();
      }
      // draw the recoloured food icon once it's ready; otherwise show a glowing dot
      const spr = getFoodSprite(f.iconSrc, f.hue);
      if (spr) {
        const dest = SPRITE_SIZE * (r / SPRITE_REF_R);
        ctx.drawImage(spr, f.x - dest / 2, f.y - dest / 2, dest, dest);
      } else {
        // fallback: flat coloured dot (until the local icon image finishes loading)
        ctx.fillStyle = `hsl(${f.hue},85%,${f.special ? 70 : 62}%)`;
        ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // floating score popups for special-food rewards
  function drawPopups() {
    if (!popups || popups.length === 0) return;
    for (const p of popups) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
      ctx.fillStyle = `hsl(${p.hue},95%,72%)`;
      ctx.font = '700 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = `hsl(${p.hue},95%,60%)`;
      ctx.shadowBlur = 12;
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    }
  }

  // Shared snake renderer — used by BOTH the real game snake and the start-screen
  // decorative preview, so the ornament looks exactly like the in-game snake.
  // snake head radius grows a little as the snake gets longer (capped so it stays playable)
  function currentHeadR() {
    // snake width = 2*r. +1px width per 100 length, capped at 500px (=r 250)
    return cfg.headR + Math.min(243, (snakeLen - cfg.snakeLen0) * 0.005);
  }
  function currentZoom() {
    // pull the view back as the snake GROWS (drive by length, not head width, so the
    // effect is actually noticeable during play). Uses a sqrt curve so early growth
    // gives a gentle, continuous zoom-out that eases off as the snake gets huge.
    // length 0 grown => zoom 1 (normal view); at +ZOOM_SPAN grown => zoom 0.5 (×2 range)
    const ZOOM_SPAN = 2600;                                  // grown-length that reaches max zoom-out
    const grown = Math.max(0, snakeLen - cfg.snakeLen0);
    const t = Math.min(1, Math.sqrt(grown / ZOOM_SPAN));    // 0 (start) → 1 (max)
    return 1 - t * 0.5;                                      // 1 → 0.5  (view sees up to ×2 world)
  }
  function paintSnake(c, pts, skin, hueShift, headAngle, boostingFlag, r = cfg.headR) {
    if (!pts || pts.length < 2) return;
    const headPt = pts[0], tail = pts[pts.length - 1];
    if (!isFinite(headPt.x) || !isFinite(headPt.y) || !isFinite(tail.x) || !isFinite(tail.y)) return;
    const R = r;
    // neon advances its hue as you eat (advance>0); lava/aurora are colour-locked (advance=0)
    const h0 = (skin.baseHue + (skin.advance ? hueShift : 0)) % 360;
    const h1 = (h0 + skin.span) % 360;
    const grad = c.createLinearGradient(headPt.x, headPt.y, tail.x, tail.y);
    grad.addColorStop(0, `hsl(${h0},${skin.sat}%,${skin.light}%)`);
    grad.addColorStop(1, `hsl(${h1},${Math.max(20, skin.sat - 5)}%,${Math.max(20, skin.light - 7)}%)`);

    c.save();
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.shadowColor = `hsl(${h0},${skin.shadowSat}%,60%)`;
    c.shadowBlur = boostingFlag ? 26 : 14;
    c.strokeStyle = grad;
    c.lineWidth = R * 2;
    c.beginPath();
    c.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
    c.stroke();
    c.restore();

    // head
    const hx = headPt.x, hy = headPt.y;
    c.save();
    c.shadowColor = `hsl(${h0},${skin.shadowSat}%,60%)`;
    c.shadowBlur = 16;
    const hg = c.createRadialGradient(hx, hy, 2, hx, hy, R);
    hg.addColorStop(0, `hsl(${h0},95%,75%)`);
    hg.addColorStop(1, `hsl(${h0},85%,55%)`);
    c.fillStyle = hg;
    c.beginPath(); c.arc(hx, hy, R, 0, Math.PI * 2); c.fill();
    c.restore();

    // eyes
    const ex = Math.cos(headAngle), ey = Math.sin(headAngle);
    const px = -ey, py = ex;
    const eo = R * 0.45, ef = R * 0.4;
    for (const s of [1, -1]) {
      const exx = hx + ex * ef + px * eo * s;
      const eyy = hy + ey * ef + py * eo * s;
      c.fillStyle = '#06121a';
      c.beginPath(); c.arc(exx, eyy, R * 0.28, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(exx + ex * 1.6, eyy + ey * 1.6, R * 0.13, 0, Math.PI * 2); c.fill();
    }
  }

  function drawSnake() {
    if (trail.length < 2) return;
    if (!isFinite(head.x) || !isFinite(head.y)) return;
    paintSnake(ctx, trail, currentSkin, hue, angle, boosting, currentHeadR());
  }

  function draw(time) {
    // The start screen is a separate screen — the game world is NOT drawn behind it.
    // (The in-game snake's look is shown on the right via the independent preview canvas.)
    // Skip even the background blit in menu state: the overlay covers the whole screen
    // with its own gradient, so the #game canvas doesn't need a frame at all there.
    if (state === STATE.MENU) return;

    // background is a cached layer — just blit it (no per-frame gradient rebuild)
    ctx.drawImage(bgCanvas, 0, 0, W, H);

    // shift + zoom the world so the snake head stays centred and the view widens as the snake grows
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(camZoom, camZoom);
    ctx.translate(-head.x, -head.y);
    drawGrid();
    drawFoods(time);
    drawSnake();
    drawPopups();
    ctx.restore();

    // soft vignette to reinforce the limited view of the big world (cached layer)
    ctx.drawImage(vigCanvas, 0, 0, W, H);

    // overlays are drawn in screen space
    if (state === STATE.PAUSE) {
      ctx.save();
      ctx.fillStyle = 'rgba(226,232,240,0.9)';
      ctx.font = '600 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('已暂停 · 按 Esc 继续', W / 2, H / 2);
      ctx.restore();
    }
    drawMinimap();
  }

  // small compass so you can orient inside the limited view of the 100x100 world
  function rrPath(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }
  function drawMinimap() {
    const size = (W < 600) ? 96 : 140;
    const pad = 14;
    const mx = W - size - pad, my = pad;
    const s = size / worldW;
    ctx.save();
    ctx.fillStyle = 'rgba(10,14,26,0.62)';
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 1;
    rrPath(ctx, mx, my, size, size, 10); ctx.fill(); ctx.stroke();
    ctx.beginPath(); rrPath(ctx, mx, my, size, size, 10); ctx.clip();
    // special foods only — plotted as bright dots so you can hunt the rare treats across the world
    // (the ~1000 normal foods are intentionally omitted to keep the minimap readable)
    if (foods) {
      for (const f of foods) {
        if (!f.special) continue;
        ctx.fillStyle = `hsl(${f.hue},90%,72%)`;
        ctx.beginPath(); ctx.arc(mx + f.x * s, my + f.y * s, 2.6, 0, Math.PI * 2); ctx.fill();
      }
    }
    // the visible window outline
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx + cam.x * , my + cam.y * , camW * , camH * );
    // your head
    if (head) {
      ctx.fillStyle = '#5eead4';
      ctx.beginPath(); ctx.arc(mx + head.x * , my + head.y * , 3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // ---- Loop ----
  function frame(now) {
    if (!last) last = now;
    let dt = (now - last) / 1000; last = now;
    dt = Math.min(dt, 0.05);
    update(dt);
    const t = now / 1000;
    draw(t);
    if (state === STATE.MENU) drawPreview(t);   // decorative snake only animates on the start screen
    requestAnimationFrame(frame);
  }

  // ---- UI ----
  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('len').textContent = Math.round(snakeLen);
    // 局内超过最高纪录时实时更新显示
    const bestEl = document.getElementById('best');
    if (score > best) {
      bestEl.textContent = score;
    } else {
      bestEl.textContent = best;
    }
  }

  function updatePauseBtn() {
    const btn = document.getElementById('pauseBtn');
    const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    btn.classList.toggle('visible', isTouch && state === STATE.PLAY);
  }

  function fmtDate(ts) {
    const d = new Date(ts);
    const p = n => String(n).padStart(2, '0');
    return `${d.getMonth() + 1}月${d.getDate()}日 ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function fillHistoryList(listEl, emptyEl) {
    listEl.innerHTML = '';
    if (history.length === 0) { emptyEl.style.display = 'block'; return; }
    emptyEl.style.display = 'none';
    history.forEach((r, i) => {
      const rank = i + 1;
      const li = document.createElement('li');
      li.innerHTML =
        `<div class="history-rank${rank <= 3 ? ' top' : ''}">${rank}</div>` +
        `<div class="history-main">` +
          `<div class="history-score"><span>${r.score}</span> 分</div>` +
          `<div class="history-meta">长度 ${r.len} · ${fmtDate(r.ts)}</div>` +
        `</div>`;
      listEl.appendChild(li);
    });
  }

  function renderHistory() {
    document.getElementById('menuBest').textContent = best;
    fillHistoryList(document.getElementById('historyList'), document.getElementById('historyEmpty'));
    fillHistoryList(document.getElementById('historyList2'), document.getElementById('historyEmpty2'));
  }

  function start() {
    reset();
    state = STATE.PLAY;
    last = performance.now();
    document.getElementById('finalRank').textContent = '';
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('gameover').classList.add('hidden');
    if (typeof setHistoryOpen === 'function') setHistoryOpen(false);  // close history overlay if open
    updatePauseBtn();
  }

  // ---- Skin picker (the start-screen ornament shares the exact in-game snake look) ----
  const skinBtn = document.getElementById('skinBtn');
  const skinPop = document.getElementById('skinPop');
  const skinListEl = document.getElementById('skinList');
  function buildSkinList() {
    skinListEl.innerHTML = '';
    SKINS.forEach( => {
      const item = document.createElement('div');
      item.className = 'skin-item' + (.id === currentSkin.id ? ' selected' : '');
      const sw = `linear-gradient(135deg,hsl(${.baseHue},${.sat}%,${.light}%),hsl(${(.baseHue + .span) % 360},${Math.max(20, .sat - 5)}%,${Math.max(20, .light - 7)}%))`;
      item.innerHTML = `<div class="skin-swatch" style="background:${sw}"></div><div class="skin-name">${.name}</div>`;
      item.addEventListener('click', () => {
        currentSkin = ;
        try { localStorage.setItem('snake360_skin', .id); } catch (e) {}
        buildSkinList();
      });
      skinListEl.appendChild(item);
    });
  }
  skinBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    skinPop.classList.toggle('hidden');
    if (!skinPop.classList.contains('hidden')) buildSkinList();
  });
  document.addEventListener('click', (e) => {
    if (!skinPop.classList.contains('hidden') &&
        !skinPop.contains(e.target) && e.target !== skinBtn && !skinBtn.contains(e.target)) {
      skinPop.classList.add('hidden');
    }
  });
  buildSkinList();

  document.getElementById('startBtn').addEventListener('click', (e) => { e.stopPropagation(); start(); });
  document.getElementById('restartBtn').addEventListener('click', (e) => { e.stopPropagation(); start(); });
  document.getElementById('resumeBtn').addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });   // 继续游戏
  document.getElementById('pauseBtn').addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });   // 暂停按钮
  document.getElementById('endBtn').addEventListener('click', (e) => {                                             // 结束游戏
    e.stopPropagation();
    document.getElementById('pausePanel').classList.add('hidden');
    quitToMenu();
  });
  document.getElementById('closeHistory').addEventListener('click', () => {
    setHistoryOpen(false);
  });

  // "历史记录" 按钮：切换历史浮层 + 遮罩的显示/隐藏
  const historyBtn = document.getElementById('historyBtn');
  const historyPanel = document.getElementById('historyPanel');
  const historyMask = document.getElementById('historyMask');
  function setHistoryOpen(open) {
    historyPanel.classList.toggle('hidden', !open);
    historyMask.classList.toggle('hidden', !open);
  }
  historyBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = historyPanel.classList.contains('hidden');
    setHistoryOpen(willOpen);
  });
  // 点击遮罩关闭浮层
  historyMask.addEventListener('click', () => setHistoryOpen(false));

  reset();                       // init state (foods/trail) so the menu loop can draw safely
  renderHistory();               // populate best (inside start button) + history panel on the start screen
  updatePauseBtn();              // ensure pause button starts hidden
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
