<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卫生任务安排工具</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-secondary: #5a6577;
            --border: #e2e8f0;
            --group1: #6366f1;
            --group1-light: #eef2ff;
            --group1-bg: #e0e7ff;
            --group1-dark: #4f46e5;
            --group2: #10b981;
            --group2-light: #ecfdf5;
            --group2-bg: #d1fae5;
            --group2-dark: #059669;
            --group3: #f59e0b;
            --group3-light: #fffbeb;
            --group3-bg: #fef3c7;
            --group3-dark: #d97706;
            --today-ring: #ef4444;
            --selected-ring: #3b82f6;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
            background-image: linear-gradient(135deg, #cce5f0 0%, #d4edda 100%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding: 8px 0 4px;
        }
        .header .icon-row {
            font-size: 2.8rem;
            margin-bottom: 4px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1a202c;
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 400;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: stretch;
        }
        .main-grid .card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 1fr;
                max-width: 500px;
                margin: 0 auto;
            }
            body {
                padding: 12px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .header .icon-row {
                font-size: 2.2rem;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: var(--transition);
            position: relative;
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }
        .card-header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .card-header h3 {
            font-size: 1.05rem;
            font-weight: 650;
            letter-spacing: -0.01em;
            margin: 0;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 8px;
        }
        .calendar-nav button {
            background: linear-gradient(135deg, #ffffff, #e3f2fd);
            border: 1px solid #90caf9;
            border-radius: 8px;
            padding: 7px 13px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #1e88e5;
            transition: var(--transition);
            font-weight: 500;
            white-space: nowrap;
        }
        .calendar-nav button:hover {
            background: linear-gradient(135deg, #e3f2fd, #90caf9);
            border-color: #64b5f6;
            color: #1565c0;
        }
        .calendar-nav button:active {
            transform: scale(0.96);
            background: linear-gradient(135deg, #bbdefb, #64b5f6);
        }
        .calendar-nav .month-label {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.01em;
            color: #1e293b;
            text-align: center;
            min-width: 120px;
        }
        .btn-today {
            background: linear-gradient(135deg, #ffffff, #b3d9ff) !important;
            color: #1e88e5 !important;
            font-weight: 600 !important;
            letter-spacing: 0.01em;
            border-color: #90caf9 !important;
        }
        .btn-today:hover {
            background: linear-gradient(135deg, #e3f2fd, #90caf9) !important;
            border-color: #64b5f6 !important;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .calendar-grid .day-header {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 6px 0;
            user-select: none;
        }
        .calendar-grid .day-header.weekend {
            color: #cbd5e1;
        }
        .calendar-grid .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            position: relative;
            color: #475569;
            user-select: none;
            background: transparent;
            border: 2px solid transparent;
        }
        .calendar-grid .day-cell:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
            transform: scale(1.05);
            z-index: 2;
        }
        .calendar-grid .day-cell.empty {
            cursor: default;
            pointer-events: none;
            background: transparent;
            border-color: transparent;
        }
        .calendar-grid .day-cell.empty:hover {
            transform: none;
            background: transparent;
            border-color: transparent;
        }
        .day-cell.group-1 {
            background: var(--group1-light);
            border-color: transparent;
            color: var(--group1-dark);
            font-weight: 600;
        }
        .day-cell.group-1:hover {
            background: var(--group1-bg);
            border-color: #c7d2fe;
        }
        .day-cell.group-2 {
            background: var(--group2-light);
            border-color: transparent;
            color: var(--group2-dark);
            font-weight: 600;
        }
        .day-cell.group-2:hover {
            background: var(--group2-bg);
            border-color: #a7f3d0;
        }
        .day-cell.group-3 {
            background: var(--group3-light);
            border-color: transparent;
            color: var(--group3-dark);
            font-weight: 600;
        }
        .day-cell.group-3:hover {
            background: var(--group3-bg);
            border-color: #fde68a;
        }
        .day-cell.today {
            border: 2.5px solid var(--today-ring) !important;
            font-weight: 700 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
            z-index: 1;
            animation: pulse-today 2s ease-in-out infinite;
        }
        @keyframes pulse-today {
            0%,
            100% {
                box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
            }
            50% {
                box-shadow: 0 0 0 7px rgba(239, 68, 68, 0.05);
            }
        }
        .day-cell.selected {
            border: 3px solid var(--selected-ring) !important;
            font-weight: 700 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            z-index: 3;
            transform: scale(1.06);
        }

        .detail-date {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a202c;
            letter-spacing: -0.02em;
            margin-bottom: 2px;
        }
        .detail-weekday {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }
        .detail-group-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.01em;
            margin-bottom: 16px;
            transition: var(--transition);
        }
        .badge-group-1 {
            background: #eef2ff;
            color: #4f46e5;
            border: 2px solid #c7d2fe;
        }
        .badge-group-2 {
            background: #ecfdf5;
            color: #059669;
            border: 2px solid #a7f3d0;
        }
        .badge-group-3 {
            background: #fffbeb;
            color: #d97706;
            border: 2px solid #fde68a;
        }
        .detail-round {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .detail-round span {
            font-weight: 700;
            color: #1e293b;
        }

        .task-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            font-size: 0.9rem;
            table-layout: fixed;
        }
        .task-table th:nth-child(1),
        .task-table td:nth-child(1) {
            width: 22%;
        }
        .task-table th:nth-child(2),
        .task-table td:nth-child(2) {
            width: 28%;
        }
        .task-table th:nth-child(3),
        .task-table td:nth-child(3) {
            width: 50%;
        }
        .task-table thead th {
            background: #f8fafc;
            padding: 11px 14px;
            text-align: left;
            font-weight: 650;
            color: #475569;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 2px solid #e2e8f0;
        }
        .task-table tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 500;
            transition: var(--transition);
        }
        .task-table tbody tr {
            transition: var(--transition);
        }
        .task-table tbody tr:hover {
            background: #fafbfd;
        }
        .task-table tbody tr:last-child td {
            border-bottom: none;
        }
        .task-table .subgroup-name {
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .task-table .subgroup-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-sg1 {
            background: #6366f1;
        }
        .dot-sg2 {
            background: #10b981;
        }
        .dot-sg3 {
            background: #f59e0b;
        }
        .dot-sg4 {
            background: #ec4899;
        }
        .task-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.01em;
            transition: var(--transition);
        }
        .task-classroom {
            background: #eef2ff;
            color: #4f46e5;
            border: 1.5px solid #c7d2fe;
        }
        .task-toilet {
            background: #fff7ed;
            color: #c2410c;
            border: 1.5px solid #fed7aa;
        }
        .task-public {
            background: #f0fdf4;
            color: #047857;
            border: 1.5px solid #bbf7d0;
        }
        .subgroup-members {
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.5;
            word-break: break-all;
            word-wrap: break-word;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #f1f5f9;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            color: #64748b;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .legend-dot.lg1 {
            background: var(--group1-light);
            border: 2px solid #c7d2fe;
        }
        .legend-dot.lg2 {
            background: var(--group2-light);
            border: 2px solid #a7f3d0;
        }
        .legend-dot.lg3 {
            background: var(--group3-light);
            border: 2px solid #fde68a;
        }
        .legend-dot.lt {
            border: 2.5px solid var(--today-ring);
            background: #fff;
            border-radius: 50%;
        }
        .legend-dot.ls {
            border: 3px solid var(--selected-ring);
            background: #fff;
            border-radius: 50%;
        }

        .footer-info {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            padding: 4px 0;
            letter-spacing: 0.02em;
        }
        .footer-info strong {
            color: #64748b;
        }

        .detail-content {
            transition: opacity 0.2s ease;
        }
        .detail-content.updating {
            opacity: 0.5;
        }

        @media print {
            body {
                background: #fff;
                padding: 0;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
            .calendar-nav button,
            .btn-today {
                display: none;
            }
            .day-cell {
                cursor: default;
            }
        }

        @media (max-width: 420px) {
            .card {
                padding: 14px 12px;
            }
            .calendar-grid {
                gap: 2px;
            }
            .calendar-grid .day-cell {
                font-size: 0.75rem;
                border-radius: 6px;
            }
            .calendar-grid .day-header {
                font-size: 0.65rem;
            }
            .calendar-nav .month-label {
                font-size: 0.9rem;
                min-width: 90px;
            }
            .calendar-nav button {
                padding: 5px 8px;
                font-size: 0.75rem;
            }
            .detail-date {
                font-size: 1.15rem;
            }
            .task-table {
                font-size: 0.78rem;
            }
            .task-table thead th,
            .task-table tbody td {
                padding: 8px 10px;
            }
            .task-badge {
                font-size: 0.7rem;
                padding: 4px 8px;
            }
        }

        .btn-settings {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border: 1px solid #90caf9;
            background: linear-gradient(135deg, #ffffff, #b3d9ff);
            color: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .btn-settings:hover {
            background: linear-gradient(135deg, #e3f2fd, #90caf9);
            transform: rotate(45deg);
        }

        /* 下载桌面端按钮 */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 4px 8px;
        }
        .btn-download-desktop {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
            letter-spacing: 0.01em;
            text-decoration: none;
        }
        .btn-download-desktop:hover {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.45);
        }
        .btn-download-desktop:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(99, 102, 241, 0.3);
        }
        .btn-download-desktop i {
            font-size: 0.95rem;
        }

        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px;
            box-sizing: border-box;
        }
        .settings-modal.active {
            display: flex;
        }
        .settings-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            width: 100%;
            max-width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modalSlideIn 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(186, 218, 235, 0.5);
            flex-shrink: 0;
            background: linear-gradient(135deg, #e8f4f8 0%, #e8f5e9 100%);
            border-radius: 20px 20px 0 0;
        }
        .settings-header h3 {
            font-size: 1.1rem;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .settings-header h3 i {
            color: #000000;
        }
        .btn-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(24, 144, 255, 0.1);
            color: #1e88e5;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        .btn-close:hover {
            background: rgba(24, 144, 255, 0.2);
            color: #1e88e5;
            transform: scale(1.1);
        }
        .settings-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .settings-body::-webkit-scrollbar {
            width: 8px;
        }
        .settings-body::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 4px;
        }
        .settings-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .settings-body::-webkit-scrollbar-thumb:hover {
            background: #6366f1;
        }
        .settings-info {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }
        .settings-info i {
            color: #1e293b;
            font-size: 1.1rem;
            margin-top: 2px;
        }
        .settings-info p {
            font-size: 0.85rem;
            color: #1e293b;
            line-height: 1.5;
            margin: 0;
        }
        .settings-field {
            margin-bottom: 16px;
        }
        .settings-field label {
            display: block;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .settings-field input[type="date"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text);
            background: var(--bg);
            transition: all 0.2s ease;
        }
        .settings-field input[type="date"]:focus {
            outline: none;
            border-color: #6366f1;
            background: var(--card-bg);
        }
        .settings-preview {
            padding: 12px 14px;
            background: var(--bg);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .preview-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .preview-value {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 500;
        }
        .settings-footer {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .btn-reset, .btn-save {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;

    <script>
        (function(){
const GCP=[{dot:"#6366f1",badge:"badge-group-1",cell:"group-1"},{dot:"#10b981",badge:"badge-group-2",cell:"group-2"},{dot:"#f59e0b",badge:"badge-group-3",cell:"group-3"},{dot:"#ef4444",badge:"badge-group-1",cell:"group-1"},{dot:"#8b5cf6",badge:"badge-group-2",cell:"group-2"},{dot:"#06b6d4",badge:"badge-group-3",cell:"group-3"},{dot:"#ec4899",badge:"badge-group-1",cell:"group-1"},{dot:"#84cc16",badge:"badge-group-2",cell:"group-2"}];
const DEFAULT_GROUP_COLORS=['#6366f1','#10b981','#d97706','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16'];
function derivePalette(hex){
    var r,g,b;
    if(hex&&hex.length>=7){
        r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);
    }else{return{text:'#4f46e5',bg:'#eef2ff',accent:'#6366f1'};}
    return{
        bg:'#'+[r,g,b].map(function(c){return Math.min(255,Math.floor(c+(255-c)*0.88)).toString(16).padStart(2,'0');}).join(''),
        text:'#'+[r,g,b].map(function(c){return Math.floor(c*0.62).toString(16).padStart(2,'0');}).join(''),
        accent:hex
    };
}
function getGroupColor(i){
    if(settings.groupColors&&settings.groupColors.length>0){
        var ci=i%settings.groupColors.length;
        var hex=settings.groupColors[ci]||DEFAULT_GROUP_COLORS[ci%DEFAULT_GROUP_COLORS.length];
        var p=derivePalette(hex);
        return{dot:p.accent,cell:'gc-'+ci,badge:'badge-gc-'+ci,isCustom:true,palette:p};
    }
    return GCP[i%GCP.length];
}

function defaultGroupName(i){return "第"+chineseNumber(i+1)+"组";}

function getTaskInfo(name){
    if(!name)return null;const l=name.toString();
    if(l.includes("教室"))return{name:name,cssClass:"task-classroom",icon:"fa-book-open"};
    if(l.includes("厕所")||l.includes("空地")||l.includes("走廊"))return{name:name,cssClass:"task-toilet",icon:"fa-broom"};
    if(l.includes("公区")||l.includes("公共")||l.includes("厅"))return{name:name,cssClass:"task-public",icon:"fa-leaf"};
    return{name:name,cssClass:"task-classroom",icon:"fa-clipboard-list"};
}

function defaultTaskSlots(n){
    const P=[{name:"教室",cssClass:"task-classroom",icon:"fa-book-open"},{name:"厕所和空地",cssClass:"task-toilet",icon:"fa-broom"},{name:"公区",cssClass:"task-public",icon:"fa-leaf"},{name:"公区",cssClass:"task-public",icon:"fa-leaf"},{name:"楼梯",cssClass:"task-public",icon:"fa-stairs"},{name:"办公室",cssClass:"task-classroom",icon:"fa-briefcase"},{name:"实验室",cssClass:"task-classroom",icon:"fa-flask"},{name:"操场",cssClass:"task-public",icon:"fa-futbol"}];
    const a=[];for(let i=0;i<n;i++)a.push(P[i%P.length]);return a;
}

function parseMembers(t){return(!t||t.trim()==="")?[]:t.split(/[,\u3001\uFF0C]+/).map(m=>m.trim()).filter(m=>m.length>0);}

function getDayDiff(date){
    const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());
    const s=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate());
    return Math.round((d.getTime()-s.getTime())/(24*60*60*1000));
}

function getGroupIndex(dd){const n=NUM_GROUPS;return((dd%n)+n)%n;}
function getRound(dd,gi){const n=NUM_SUBGROUPS_PER_GROUP[gi]||4;const f=Math.floor(dd/NUM_GROUPS);return((f%n)+n)%n;}

function getTaskSlots(gi){return defaultTaskSlots(NUM_SUBGROUPS_PER_GROUP[gi]||4);}

function getTaskAssignment(round,gi){
    const a=[];
    const slots=getTaskSlots(gi);
    const numSubgroups=NUM_SUBGROUPS_PER_GROUP[gi]||4;
    for(let i=0;i<numSubgroups;i++){
        const ti=((i-round)+numSubgroups)%numSubgroups;
        let task;
        if(CUSTOM_TASKS[gi]&&CUSTOM_TASKS[gi][i]&&String(CUSTOM_TASKS[gi][i]).trim()!==""){
            // 自定义任务：根据该组的 TASK_ROTATION 决定是否轮转
            const customIdx = (TASK_ROTATION[gi]!==false) ? ti : i;
            if (CUSTOM_TASKS[gi][customIdx] && String(CUSTOM_TASKS[gi][customIdx]).trim() !== "") {
                task = getTaskInfo(CUSTOM_TASKS[gi][customIdx]);
            } else {
                task = slots[ti];
            }
        }else{
            task=slots[ti];
        }
        const sgKey="g"+gi+"s"+i;
        const sgName=SUBGROUP_NAMES[sgKey]||defaultSubgroupName(i);
        a.push({subgroupIndex:i,subgroupName:sgName,task:task,taskIndex:ti});
    }
    return a;
}

function getDateInfo(date){
    const dd=getDayDiff(date);
    const gi=getGroupIndex(dd);
    const round=getRound(dd,gi);
    const as=getTaskAssignment(round,gi);
    return{date:new Date(date.getFullYear(),date.getMonth(),date.getDate()),dayDiff:dd,groupIndex:gi,groupName:GROUP_NAMES[gi]||defaultGroupName(gi),round:round,assignments:as};
}

function renderCalendar(){
    const year=currentViewYear;const month=currentViewMonth;
    const firstDay=new Date(year,month,1);
    const daysInMonth=new Date(year,month+1,0).getDate();
    const startDow=firstDay.getDay();
    const hdrs=["日","一","二","三","四","五","六"];
    let html="";
    hdrs.forEach((dh,i)=>{const wc=(i===0||i===6)?" weekend":"";html+='<div class="day-header'+wc+'">'+dh+'</div>';});
    for(let i=0;i<startDow;i++)html+='<div class="day-cell empty"></div>';
    const today=new Date();
    const ts=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
    const ss=selectedDate.getFullYear()+"-"+String(selectedDate.getMonth()+1).padStart(2,"0")+"-"+String(selectedDate.getDate()).padStart(2,"0");
    for(let d=1;d<=daysInMonth;d++){
        const cellDate=new Date(year,month,d);
        const cs=cellDate.getFullYear()+"-"+String(cellDate.getMonth()+1).padStart(2,"0")+"-"+String(cellDate.getDate()).padStart(2,"0");
        const info=getDateInfo(cellDate);
        const color=getGroupColor(info.groupIndex);
        let cls=["day-cell"];
        if(color.cell)cls.push(color.cell);
        if(cs===ts)cls.push("today");
        if(cs===ss)cls.push("selected");
        html+=`<div class="${cls.join(" ")}" data-date="${cs}" title="${cs} ${info.groupName.replace(/"/g, '&quot;')} - 第${info.round}轮">${d}</div>`;
    }
    const tc=startDow+daysInMonth;
    const rc=tc%7===0?0:7-(tc%7);
    for(let i=0;i<rc;i++)html+='<div class="day-cell empty"></div>';
    calendarGrid.innerHTML=html;
    monthLabel.textContent=year+"年 "+(month+1)+"月";
    calendarGrid.querySelectorAll('.day-cell:not(.empty)').forEach(cell=>{
        cell.addEventListener("click",function(){
            const parts=this.getAttribute("data-date").split("-");
            selectedDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
            renderCalendar();renderDetail();
            detailContent.classList.add("updating");
            setTimeout(()=>detailContent.classList.remove("updating"),180);
        });
    });
}

// 把当前 DOM 表单数据同步到内存变量（标签页切换前调用，防止数据丢失）
function flushFormData(){
    // 保存当前活跃任务组输入
    const tg = activeTaskGroupTab;
    if (tg < NUM_GROUPS && CUSTOM_TASKS[tg]) {
        for (let s = 0; s < (NUM_SUBGROUPS_PER_GROUP[tg] || 4); s++) {
            const el = document.getElementById("task-g" + tg + "-s" + s);
            if (el) CUSTOM_TASKS[tg][s] = el.value.trim() || null;
        }
    }
    // 保存当前活跃成员组输入
    const mg = activeMemberGroupTab;
    if (mg < NUM_GROUPS && SUBGROUP_MEMBERS[mg]) {
        for (let s = 0; s < (NUM_SUBGROUPS_PER_GROUP[mg] || 4); s++) {
            const el = document.getElementById("members-g" + mg + "-s" + s);
            if (el) SUBGROUP_MEMBERS[mg][s] = parseMembers(el.value);
        }
    }
    // 保存任务轮转复选框
    document.querySelectorAll('.taskRotationCheck').forEach(function(cb){
        var gi = parseInt(cb.dataset.gi);
        if (gi < NUM_GROUPS) TASK_ROTATION[gi] = cb.checked;
    });
}

function onGroupColorChange(input){
    var gi=parseInt(input.dataset.gi);
    if(!settings.groupColors)settings.groupColors=[...DEFAULT_GROUP_COLORS];
    while(settings.groupColors.length<=gi)settings.groupColors.push(DEFAULT_GROUP_COLORS[settings.groupColors.length%DEFAULT_GROUP_COLORS.length]);
    settings.groupColors[gi]=input.value;
    input.nextElementSibling.textContent=input.value;
}

        NUM_SUBGROUPS_PER_GROUP.splice(idx,1);
        SUBGROUP_MEMBERS.splice(idx,1);
        CUSTOM_TASKS.splice(idx,1);
        NUM_GROUPS--;
        for(let i=0;i<NUM_GROUPS;i++){
            if(GROUP_NAMES[i]===defaultGroupName(i))continue;
            const expectedName=defaultGroupName(i);
            const currentName=GROUP_NAMES[i];
            const pattern=/^第([一二三四五六七八九十\d]+)组$/;
            const match=currentName.match(pattern);
            if(match){
                GROUP_NAMES[i]=expectedName;
            }
        }
        activeMemberGroupTab=Math.min(activeMemberGroupTab,NUM_GROUPS-1);
        activeTaskGroupTab=Math.min(activeTaskGroupTab,NUM_GROUPS-1);
        buildSettingsUI();
    });
}

function addSubgroup(groupIdx){
    const currentCount=NUM_SUBGROUPS_PER_GROUP[groupIdx]||4;
    if(currentCount>=20){showConfirm("提示","该大组的小组数量最多为20个",()=>{});return;}
    NUM_SUBGROUPS_PER_GROUP[groupIdx]=currentCount+1;
    if(!SUBGROUP_MEMBERS[groupIdx])SUBGROUP_MEMBERS[groupIdx]=[];
    SUBGROUP_MEMBERS[groupIdx].push([]);
    if(!CUSTOM_TASKS[groupIdx])CUSTOM_TASKS[groupIdx]=[];
    CUSTOM_TASKS[groupIdx].push(null);
    buildSettingsUI();
}

function removeSubgroup(groupIdx){
    const currentCount=NUM_SUBGROUPS_PER_GROUP[groupIdx]||4;
    if(currentCount<=1){showConfirm("提示","每个大组至少保留1个小组",()=>{});return;}
    showConfirm("确认删除小组","确定要删除「"+GROUP_NAMES[groupIdx]+"」的最后一个小组吗？该小组的所有成员和任务数据将被清除。",function(){
        NUM_SUBGROUPS_PER_GROUP[groupIdx]=currentCount-1;
        if(SUBGROUP_MEMBERS[groupIdx])SUBGROUP_MEMBERS[groupIdx].pop();
        if(CUSTOM_TASKS[groupIdx])CUSTOM_TASKS[groupIdx].pop();
        buildSettingsUI();
    });
}

function openSettingsModal(){
    startDateInput.value=START_DATE.toISOString().split("T")[0];
    updatePreview();
    buildSettingsUI();
    switchTab("date");
    settingsModal.classList.add("active");
}

function closeSettingsModal(){settingsModal.classList.remove("active");}

function updatePreview(){
    const d=new Date(startDateInput.value);
    previewValue.textContent=d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日（"+(GROUP_NAMES[0]||"第一组")+" - 第0轮）";
}

function applySettings(){
    flushFormData();  // 最后确保当前标签页数据已同步到内存
    const nd=new Date(startDateInput.value);
    if(isNaN(nd.getTime())){showConfirm("提示","请选择有效的日期",()=>{});return;}
    START_DATE=nd;
    // 直接从内存变量取值（flushFormData 已确保 DOM → 内存同步），不再依赖 DOM
    settings={startDate:START_DATE,numGroups:NUM_GROUPS,groupNames:GROUP_NAMES,numSubgroupsPerGroup:NUM_SUBGROUPS_PER_GROUP,subgroupNames:SUBGROUP_NAMES,members:SUBGROUP_MEMBERS,customTasks:CUSTOM_TASKS,taskRotation:TASK_ROTATION,groupColors:settings.groupColors||[...DEFAULT_GROUP_COLORS]};
    saveSettings(settings);
    currentViewYear=START_DATE.getFullYear();
    currentViewMonth=START_DATE.getMonth();
    selectedDate=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate());
    const rt=new Date();
    if(rt>=START_DATE){selectedDate=new Date(rt.getFullYear(),rt.getMonth(),rt.getDate());currentViewYear=rt.getFullYear();currentViewMonth=rt.getMonth();}
    updateDynamicStyles();renderLegend();
    renderCalendar();renderDetail();closeSettingsModal();
}

function resetSettings(){
    showConfirm("确认恢复默认","确定要恢复所有设置为默认值吗？所有自定义的组、任务和成员数据都将被清除。",function(){
        startDateInput.value=DEFAULT_START_DATE.toISOString().split("T")[0];
        NUM_GROUPS=3;
        GROUP_NAMES=["第一组","第二组","第三组"];
        NUM_SUBGROUPS_PER_GROUP=[4,4,4];
        SUBGROUP_NAMES={};
        SUBGROUP_MEMBERS=[[[],[],[],[]],[[],[],[],[]],[[],[],[],[]]];
        CUSTOM_TASKS=[[null,null,null,null],[null,null,null,null],[null,null,null,null]];
        TASK_ROTATION=[true,true,true];
        settings.groupColors=[...DEFAULT_GROUP_COLORS];
        activeMemberGroupTab=0;activeTaskGroupTab=0;
        updatePreview();buildSettingsUI();
    });
}

btnSettings.addEventListener("click",openSettingsModal);
btnCloseSettings.addEventListener("click",closeSettingsModal);
btnSaveSettings.addEventListener("click",applySettings);
btnResetSettings.addEventListener("click",resetSettings);
startDateInput.addEventListener("change",updatePreview);

// 云端同步
function showToast(message, isSuccess = true) {
    const toastModal = document.getElementById("toastModal");
    const toastIcon = document.getElementById("toastIcon");
    const toastMessage = document.getElementById("toastMessage");
    if (toastMessage) toastMessage.textContent = message;
    if (toastIcon) {
        toastIcon.style.background = isSuccess ? "#10b981" : "#ef4444";
        toastIcon.innerHTML = '<i class="fa-solid ' + (isSuccess ? 'fa-check' : 'fa-xmark') + '"></i>';
    }
    if (toastModal) {
        toastModal.classList.add("active");
    }
}

function hideToast() {
    const toastModal = document.getElementById("toastModal");
    if (toastModal) toastModal.classList.remove("active");
}

document.getElementById("toastModal")?.addEventListener("click", function(e) {
    if (e.target === this) hideToast();
});
document.getElementById("btnNotifyOk")?.addEventListener("click", hideToast);

document.getElementById("btnUploadSettings").addEventListener("click",async function(){
    const subgroup_names=[];
    for(let g=0;g<NUM_GROUPS;g++){
        const sg=[];
        for(let si=0;si<(NUM_SUBGROUPS_PER_GROUP[g]||4);si++)sg.push(SUBGROUP_NAMES['g'+g+'s'+si]||defaultSubgroupName(si));
        subgroup_names.push(sg);
    }
    try{
        await supabase.from('schedule_config').upsert({id:1,data:{
            start_date:START_DATE.toISOString().split('T')[0],
            groups:GROUP_NAMES,
            subgroup_names:subgroup_names,
            tasks:CUSTOM_TASKS||[],
            members:SUBGROUP_MEMBERS||[],
            task_rotation:TASK_ROTATION,
            group_colors:settings.groupColors||DEFAULT_GROUP_COLORS
        }});
        showToast('上传成功', true);
    }catch(e){showToast('上传失败: '+e.message, false);}
});
document.getElementById("btnDownloadSettings").addEventListener("click",async function(){
    var btn = this;
    var origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 下载中...';
    btn.style.opacity = '0.6';
    try{
        const{data}=await supabase.from('schedule_config').select('data').eq('id',1).single();
        if(!data||!data.data){showToast('云端没有数据', false);return;}
        const p=data.data;
        const ng=Math.max(1,Math.min(20,parseInt(p.groups?p.groups.length:3)||3));
        const gn=p.groups&&p.groups.length===ng?p.groups:Array.from({length:ng},(v,i)=>defaultGroupName(i));
        const ns=p.subgroup_names?p.subgroup_names.map(function(sg){return sg.length;}):Array.from({length:ng},function(){return 4;});
        const sn={};
        if(p.subgroup_names){for(let g=0;g<p.subgroup_names.length;g++){for(let s=0;s<p.subgroup_names[g].length;s++){sn['g'+g+'s'+s]=p.subgroup_names[g][s];}}}
        const mb=p.members&&p.members.length===ng?p.members:Array.from({length:ng},function(v,g){return Array.from({length:ns[g]||4},function(){return [];});});
        const ct=p.tasks&&p.tasks.length===ng?p.tasks:Array.from({length:ng},function(v,g){return Array.from({length:ns[g]||4},function(){return null;});});
        // 更新所有内存变量
        NUM_GROUPS=ng;GROUP_NAMES=gn;NUM_SUBGROUPS_PER_GROUP=ns;SUBGROUP_NAMES=sn;
        SUBGROUP_MEMBERS=mb;CUSTOM_TASKS=ct;
        TASK_ROTATION=p.task_rotation||Array.from({length:ng},function(){return true;});
        settings.groupColors=p.group_colors||[...DEFAULT_GROUP_COLORS];
        START_DATE=p.start_date ? new Date(p.start_date) : DEFAULT_START_DATE;
        // 自动保存（无需用户再点"保存设置"）
        settings={startDate:START_DATE,numGroups:NUM_GROUPS,groupNames:GROUP_NAMES,
            numSubgroupsPerGroup:NUM_SUBGROUPS_PER_GROUP,subgroupNames:SUBGROUP_NAMES,
            members:SUBGROUP_MEMBERS,customTasks:CUSTOM_TASKS,taskRotation:TASK_ROTATION,
            groupColors:settings.groupColors};
        saveSettings(settings);
        activeMemberGroupTab=0;activeTaskGroupTab=0;
        currentViewYear=START_DATE.getFullYear();currentViewMonth=START_DATE.getMonth();
        selectedDate=new Date(START_DATE.getFullYear(),START_DATE.getMonth(),START_DATE.getDate());
        var rt=new Date();
        if(rt>=START_DATE){selectedDate=new Date(rt.getFullYear(),rt.getMonth(),rt.getDate());currentViewYear=rt.getFullYear();currentViewMonth=rt.getMonth();}
        updateDynamicStyles();renderLegend();
        renderCalendar();renderDetail();
        closeSettingsModal();
        showToast('下载成功，已自动应用', true);
    }catch(e){showToast('下载失败: '+e.message, false);}
    finally{
        btn.disabled = false;
        btn.innerHTML = origHTML;
        btn.style.opacity = '';
    }
});

btnPrev.addEventListener("click",()=>{
    if(currentViewMonth===0){currentViewMonth=11;currentViewYear--;}
    else currentViewMonth--;
    renderCalendar();
});

btnNext.addEventListener("click",()=>{
    if(currentViewMonth===11){currentViewMonth=0;currentViewYear++;}
    else currentViewMonth++;
    renderCalendar();
});

btnToday.addEventListener("click",()=>{
    const today=new Date();
    currentViewYear=today.getFullYear();currentViewMonth=today.getMonth();
    selectedDate=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    renderCalendar();renderDetail();
    detailContent.classList.add("updating");
    setTimeout(()=>detailContent.classList.remove("updating"),180);
});

settingsModal.addEventListener("click",function(e){if(e.target===settingsModal)closeSettingsModal();});

document.addEventListener("keydown",function(e){
    if(e.key==="Escape"&&settingsModal.classList.contains("active")){closeSettingsModal();return;}
    const im=settingsModal.classList.contains("active");
    const ifl=["INPUT","TEXTAREA"].includes(document.activeElement.tagName);
    if(e.key==="ArrowLeft"&&!im&&!ifl){
        e.preventDefault();selectedDate.setDate(selectedDate.getDate()-1);
        currentViewYear=selectedDate.getFullYear();currentViewMonth=selectedDate.getMonth();
        renderCalendar();renderDetail();
    }else if(e.key==="ArrowRight"&&!im&&!ifl){
        e.preventDefault();selectedDate.setDate(selectedDate.getDate()+1);
        currentViewYear=selectedDate.getFullYear();currentViewMonth=selectedDate.getMonth();
        renderCalendar();renderDetail();
    }else if(e.key==="t"&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&!im){
        const today=new Date();
        currentViewYear=today.getFullYear();currentViewMonth=today.getMonth();
        selectedDate=new Date(today.getFullYear(),today.getMonth(),today.getDate());
        renderCalendar();renderDetail();
    }
});

    updateDynamicStyles();renderLegend();
    renderCalendar();renderDetail();
}
