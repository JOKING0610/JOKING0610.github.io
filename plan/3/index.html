<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权码管理</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #d1fae5 100%);
            min-height: 100vh; padding: 30px;
        }
        h1 { text-align: center; color: #1e293b; margin-bottom: 24px; font-size: 1.6rem; }
        .container { max-width: 960px; margin: 0 auto; }

        .card {
            background: rgba(255,255,255,0.9);
            border-radius: 16px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .card h2 {
            font-size: 1.1rem; color: #1e293b; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .card h2 i { color: #6366f1; }

        .gen-row {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .gen-row input[type="text"] {
            padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px;
            font-size: 0.95rem; font-family: 'SF Mono','Consolas',monospace;
            flex: 1; min-width: 200px;
        }
        .gen-row input[type="text"]:focus {
            outline: none; border-color: #6366f1; background: #f8fafc;
        }
        .gen-row input[type="number"] {
            width: 80px; padding: 10px 8px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 0.95rem; text-align: center;
        }
        .gen-row input[type="number"]:focus {
            outline: none; border-color: #6366f1;
        }
        .gen-row label {
            font-size: 0.85rem; color: #475569; white-space: nowrap;
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;
            white-space: nowrap;
        }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .btn-danger:hover { background: #fee2e2; }
        .btn-sm { padding: 6px 10px; font-size: 0.78rem; border-radius: 8px; }

        table {
            width: 100%; border-collapse: collapse; font-size: 0.85rem;
        }
        th {
            text-align: left; padding: 10px 12px; color: #64748b;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em;
            border-bottom: 2px solid #e2e8f0; font-weight: 650;
        }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        tr:hover td { background: #f8fafc; }
        .key-cell {
            font-family: 'SF Mono','Consolas',monospace; font-weight: 600;
            color: #6366f1;
        }
        .status-free {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            background: #dcfce7; color: #16a34a;
        }
        .status-used {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            background: #eef2ff; color: #6366f1;
        }
        .uuid-list {
            font-size: 0.75rem; color: #64748b; max-width: 240px;
            font-family: 'SF Mono','Consolas',monospace; word-break: break-all;
            line-height: 1.4;
        }
        .uuid-item {
            display: block; padding: 2px 0;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #fff; padding: 12px 24px;
            border-radius: 10px; font-size: 0.9rem; z-index: 100;
            animation: toastIn 0.3 ease;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }

        .stats {
            display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat {
            flex: 1; min-width: 120px; background: rgba(255,255,255,0.8);
            border-radius: 12px; padding: 16px; text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .stat .num { font-size: 1.8rem; font-weight: 700; color: #6366f1; }
        .stat .label { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fa-solid fa-key"></i> 授权码管理</h1>

    <div class="stats" id="stats"></div>

    <div class="card">
        <h2><i class="fa-solid fa-plus"></i> 生成授权码</h2>
        <div class="gen-row">
            <input type="text" id="customKey" placeholder="输入自定义授权码（留空随机生成）" maxlength="40">
            <label>使用次数：</label>
            <input type="number" id="maxUses" value="1" min="0" max="999" title="0=无限">
            <label style="font-size:0.75rem;color:#94a3b8;">(0=无限)</label>
            <button class="btn btn-primary" onclick="generateKey()"><i class="fa-solid fa-cloud-arrow-up"></i> 生成并上传</button>
            <button class="btn btn-secondary" onclick="randomizeKey()"><i class="fa-solid fa-shuffle"></i> 随机</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fa-solid fa-list"></i> 授权码列表</h2>
        <table>
            <thead>
                <tr>
                    <th>授权码</th><th>使用次数</th><th>状态</th><th>绑定设备</th>
                    <th>创建时间</th><th>最后激活</th><th style="width:110px;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
            <button class="btn btn-secondary btn-sm" onclick="loadKeys()"><i class="fa-solid fa-rotate"></i> 刷新</button>
            <span style="font-size:0.78rem;color:#94a3b8;" id="recordCount"></span>
        </div>
    </div>
</div>

<script>
(function(){
var SUPABASE_URL='https://yeogthpysbqgehjkayaf.supabase.co';
var SUPABASE_ANON_KEY='sb_publishable_WoO50Mbz0Rhfy0nPugE3vA_5UP__SYX';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function randomKey(len){
    len=len||12;
    var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    var ='';
    for(var i=0;i<len;i++)+=chars[Math.floor(Math.random()*chars.length)];
    return ;
}

function showToast(msg,dur){
    dur=dur||2000;
    var t=document.createElement('div');
    t.className='toast';t.textContent=msg;document.body.appendChild(t);
    setTimeout(function(){t.remove();},dur);
}

function randomizeKey(){
    document.getElementById('customKey').value=randomKey(12);
    document.getElementById('customKey').focus();
    document.getElementById('customKey').select();
}

async function generateKey(){
    var input=document.getElementById('customKey');
    var key=input.value.trim()||randomKey(12);
    key=key.toUpperCase();
    var maxUses=parseInt(document.getElementById('maxUses').value);
    if(isNaN(maxUses)||maxUses<0)maxUses=1;
    if(maxUses<0)maxUses=0;
    var btn=event.target;
    btn.disabled=true;btn.textContent='生成中...';
    try{
        var{error}=await sb.from('license_keys').insert({
            license_key:key,
            max_uses:maxUses,
            used_uuids:'',
            created_at:new Date().toISOString()
        });
        if(error){
            if(error.code==='23505')showToast('该授权码已存在');
            else showToast('生成失败: '+error.message);
        }else{
            showToast('授权码 '+key+'（限'+((maxUses===0)?'无限':maxUses)+'次）已创建');
            input.value='';
            loadKeys();
        }
    }catch(e){showToast('网络错误: '+e.message);}
    btn.disabled=false;btn.textContent='生成并上传';
}

async function deleteKey(key){
    if(!confirm('确定要删除授权码 '+key+' 吗？'))return;
    try{
        await sb.from('license_keys').delete().eq('license_key',key);
        showToast('已删除 '+key);
        loadKeys();
    }catch(e){showToast('删除失败: '+e.message);}
}

async function resetKey(key){
    if(!confirm('确定要重置授权码 '+key+' 的绑定状态吗？\n所有已激活设备将被清除。'))return;
    try{
        await sb.from('license_keys').update({used_uuids:'',activated_at:null}).eq('license_key',key);
        showToast('已重置 '+key);
        loadKeys();
    }catch(e){showToast('重置失败: '+e.message);}
}

async function loadKeys(){
    try{
        var{data}=await sb.from('license_keys').select('*').order('created_at',{ascending:false});
        if(!data)data=[];
        var html='';
        var used=0,free=0,totalUses=0;
        for(var i=0;i<data.length;i++){
            var r=data[i];
            var usedRaw=r.used_uuids||'';
            var uuidList=usedRaw?usedRaw.split(',').filter(function(u){return u.trim();}):[];
            var useCount=uuidList.length;
            var maxUses=r.max_uses||1;
            totalUses+=useCount;
            if(useCount>0)used++;else free++;

            var statusHtml;
            if(maxUses===0){
                statusHtml='<span class="status-used">无限</span>';
            }else if(useCount>=maxUses){
                statusHtml='<span class="status-used">已满 ('+useCount+'/'+maxUses+')</span>';
            }else if(useCount>0){
                statusHtml='<span class="status-used">使用中 ('+useCount+'/'+maxUses+')</span>';
            }else{
                statusHtml='<span class="status-free">未使用 (0/'+maxUses+')</span>';
            }

            var uuidsHtml='';
            if(uuidList.length===0){
                uuidsHtml='<span style="color:#94a3b8;">—</span>';
            }else{
                for(var j=0;j<uuidList.length;j++){
                    uuidsHtml+='<span class="uuid-item">'+uuidList[j]+'</span>';
                }
            }

            html+='<tr>';
            html+='<td class="key-cell">'+r.license_key+'</td>';
            html+='<td style="font-size:0.85rem;font-weight:600;color:'+(maxUses===0?'#6366f1':'#475569')+';">'+(maxUses===0?'∞':maxUses)+'</td>';
            html+='<td>'+statusHtml+'</td>';
            html+='<td class="uuid-list">'+uuidsHtml+'</td>';
            html+='<td style="font-size:0.78rem;color:#94a3b8;">'+(r.created_at?(new Date(r.created_at)).toLocaleString('zh-CN'):'—')+'</td>';
            html+='<td style="font-size:0.78rem;color:#94a3b8;">'+(r.activated_at?(new Date(r.activated_at)).toLocaleString('zh-CN'):'—')+'</td>';
            html+='<td>';
            if(uuidList.length>0){
                html+='<button class="btn btn-danger btn-sm" onclick="resetKey(\''+r.license_key+'\')">解绑</button> ';
            }
            html+='<button class="btn btn-danger btn-sm" onclick="deleteKey(\''+r.license_key+'\')">删除</button>';
            html+='</td>';
            html+='</tr>';
        }
        if(!data.length)html='<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:24px;">暂无授权码</td></tr>';
        document.getElementById('tableBody').innerHTML=html;
        document.getElementById('recordCount').textContent='共 '+data.length+' 条 · '+totalUses+' 次激活';
        document.getElementById('stats').innerHTML=
            '<div class="stat"><div class="num">'+data.length+'</div><div class="label">授权码总数</div></div>'+
            '<div class="stat"><div class="num" style="color:#16a34a;">'+free+'</div><div class="label">未使用</div></div>'+
            '<div class="stat"><div class="num" style="color:#6366f1;">'+used+'</div><div class="label">已激活</div></div>'+
            '<div class="stat"><div class="num">'+totalUses+'</div><div class="label">总激活次数</div></div>';
    }catch(e){
        showToast('加载失败: '+e.message+' 。请在 Supabase 中创建 license_keys 表 (字段: license_key, max_uses, used_uuids, created_at, activated_at)');
    }
}
window.generateKey=generateKey;
window.randomizeKey=randomizeKey;
window.deleteKey=deleteKey;
window.resetKey=resetKey;

loadKeys();
document.getElementById('customKey').placeholder=randomKey(12)+'（留空随机生成）';
})();
</script>
</body>
</html>
